function getRecTimerStr() {
  const m = Math.floor(recTimer / 60), s = recTimer % 60;
  return `${m}:${s.toString().padStart(2, '0')}`;
}
function updateRecTimerDisplay() {
  document.getElementById('rec-timer-display').textContent = getRecTimerStr();
}
function updateRecTimerBtn() {
  document.getElementById('rec-timer-btn').textContent = recTimerRunning ? '⏸' : '▶';
}
function toggleRecTimer() {
  if (recTimerRunning) {
    clearInterval(recTimerIv); recTimerRunning = false;
  } else {
    recTimerIv = setInterval(() => {
      if (recTimer > 0) { recTimer--; updateRecTimerDisplay(); }
      else { clearInterval(recTimerIv); recTimerRunning = false; updateRecTimerBtn(); }
    }, 1000);
    recTimerRunning = true;
  }
  updateRecTimerBtn();
}
function resetRecTimer() {
  clearInterval(recTimerIv); recTimerRunning = false; recTimer = 600;
  updateRecTimerDisplay(); updateRecTimerBtn();
}
function editTimer() {
  const val = prompt('タイマーを設定 (例: 5:30)', getRecTimerStr());
  if (!val) return;
  const parts = val.split(':');
  if (parts.length === 2) {
    recTimer = (parseInt(parts[0]) || 0) * 60 + (parseInt(parts[1]) || 0);
    updateRecTimerDisplay();
  }
}

function renderTournamentViewer(tData, gameDocs) {
  // 展開中の試合IDを記憶してから再描画
  const expanded = new Set(
    [...document.querySelectorAll('.vt-game-detail[open]')].map(el => el.dataset.gameId)
  );

  // 日付 → Game No. 順にソート
  const sorted = [...gameDocs].sort((a, b) => {
    const da = a.data(), db2 = b.data();
    const dateA = da.gameDate || '', dateB = db2.gameDate || '';
    if (dateA !== dateB) return dateA < dateB ? -1 : 1;
    return (parseInt(da.gameNo) || 0) - (parseInt(db2.gameNo) || 0);
  });

  const now = Date.now();

  // LIVE判定：2時間以内に更新された試合があるか
  const hasLive = sorted.some(doc => {
    const u = doc.data().updatedAt;
    return u && (now - new Date(u).getTime()) < 7200000;
  });
  document.getElementById('viewer-live-badge').style.display = hasLive ? 'flex' : 'none';

  // 最終更新時刻
  const latestMs = sorted.reduce((mx, doc) => {
    const t = doc.data().updatedAt ? new Date(doc.data().updatedAt).getTime() : 0;
    return t > mx ? t : mx;
  }, 0);
  if (latestMs > 0) {
    const d = new Date(latestMs);
    document.getElementById('viewer-updated').textContent =
      `更新 ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
  }

  const period = [tData.startDate, tData.endDate].filter(Boolean).join(' 〜 ');
  const metaLine = [period, tData.venue ? '📍 ' + tData.venue : ''].filter(Boolean).join('　');

  if (sorted.length === 0) {
    document.getElementById('viewer-content').innerHTML = `
      <div class="viewer-tournament-name">${esc(tData.name || '大会')}</div>
      ${metaLine ? `<div class="viewer-game-info">${esc(metaLine)}</div>` : ''}
      <div class="viewer-error" style="padding:48px 0"><p>まだ試合データがありません</p></div>`;
    return;
  }

  const cards = sorted.map(doc => {
    const d = doc.data();
    const gameId = doc.id;
    const teamA = d.teamAName || 'チームA';
    const teamB = d.teamBName || 'チームB';
    const plays = parsePBP(d.pbpData || '');
    const st = buildState(plays);
    const totalA = st.qScore.A.reduce((a, b) => a + b, 0);
    const totalB = st.qScore.B.reduce((a, b) => a + b, 0);
    const maxQ = plays.length > 0 ? Math.max(...plays.map(p => p.quarter)) : 0;
    const qLabel = maxQ > 4 ? `延長${maxQ - 4}` : maxQ > 0 ? `${maxQ}Q` : '';
    const label = [d.gameDate, d.gameNo ? `Game ${d.gameNo}` : ''].filter(Boolean).join('　');
    const winner = totalA > totalB ? 'A' : totalB > totalA ? 'B' : null;
    const isGameLive = d.updatedAt && (now - new Date(d.updatedAt).getTime()) < 7200000 && plays.length > 0;
    const graphSVG = plays.length > 1 ? buildScoreGraphSVG(plays, teamA, teamB) : '';
    const isOpen = expanded.has(gameId);

    const qRow = st.qScore.A.map((s, i) => {
      const lbl = i < 4 ? `${i+1}Q` : 'OT';
      return `<span class="vt-qcell">
        <span class="vt-qcell-label">${lbl}</span>
        <span class="vt-qcell-a">${s||0}</span>
        <span class="vt-qcell-sep">-</span>
        <span class="vt-qcell-b">${st.qScore.B[i]||0}</span>
      </span>`;
    }).join('');

    return `<details class="vt-game-detail" data-game-id="${gameId}"${isOpen ? ' open' : ''}>
      <summary class="vt-game-summary">
        <div class="vt-summary-inner">
          <div class="vt-game-label">
            ${esc(label) || '試合'}
            ${isGameLive ? '<span class="vt-live-chip">LIVE</span>' : ''}
          </div>
          <div class="vt-scoreline">
            <span class="vt-team-name${winner==='A' ? ' vt-winner' : ''}">${esc(teamA)}</span>
            <span class="vt-score-a${winner==='A' ? ' vt-winner' : ''}">${totalA}</span>
            <span class="vt-dash">-</span>
            <span class="vt-score-b${winner==='B' ? ' vt-winner' : ''}">${totalB}</span>
            <span class="vt-team-name${winner==='B' ? ' vt-winner' : ''}">${esc(teamB)}</span>
            ${qLabel ? `<span class="vt-qlabel">${qLabel}</span>` : ''}
          </div>
          <div class="vt-qrow">${qRow}</div>
        </div>
        <span class="vt-expand-icon">▼</span>
      </summary>
      <div class="vt-game-body">
        ${graphSVG ? `<div class="score-graph-wrap" style="margin-bottom:16px">
          <div class="score-graph-title">得点推移グラフ</div>${graphSVG}
        </div>` : ''}
        ${plays.length > 0
          ? renderViewerScoresheet({ ...d, tournamentName: tData.name || '' })
          : '<p style="padding:8px 0;color:var(--text-mid)">PBPデータがありません</p>'}
      </div>
    </details>`;
  }).join('');

  document.getElementById('viewer-content').innerHTML = `
    <div class="viewer-tournament-name">${esc(tData.name || '大会')}</div>
    ${metaLine ? `<div class="viewer-game-info">${esc(metaLine)}</div>` : ''}
    <div class="vt-game-list">${cards}</div>`;
}

function renderViewerScoresheet(data) {
  const teamAName = data.teamAName || 'チームA';
  const teamBName = data.teamBName || 'チームB';
  const plays = parsePBP(data.pbpData || '');
  const st = buildState(plays);
  const totalA = st.qScore.A.reduce((a, b) => a + b, 0);
  const totalB = st.qScore.B.reduce((a, b) => a + b, 0);
  const winner = totalA > totalB ? esc(teamAName) : totalB > totalA ? esc(teamBName) : '引き分け';
  return `<div class="sheet-outer"><div class="sheet">
  <div class="sheet-header">
    <div class="header-title-block">
      <div class="sheet-title">BASKETBALL SCORESHEET</div>
      <div class="sheet-subtitle">Basketball Manual</div>
    </div>
    <div class="header-info-block">
      <div class="info-row">
        <div class="info-cell"><label>Game No.:</label> ${esc(data.gameNo||'')}</div>
        <div class="info-cell"><label>審判:</label></div>
        <div class="info-cell"><label>開始時間:</label></div>
      </div>
      <div class="info-row">
        <div class="info-cell"><label>大会名:</label> ${esc(data.tournamentName||'')}</div>
        <div class="info-cell"><label>日付:</label> ${esc(data.gameDate||'')}</div>
        <div class="info-cell"><label>会場:</label> ${esc(data.venue||'')}</div>
      </div>
    </div>
  </div>
  <div class="sheet-main">
    <div class="left-panel">
      ${teamSection('A', teamAName, st)}
      ${teamSection('B', teamBName, st)}
    </div>
    <div class="right-panel">
      <div class="running-label">ランニングスコア</div>
      <table class="running-score-table">
        <colgroup>${Array(4).fill(0).map(()=>`<col class="col-a-blank"><col class="col-num"><col class="col-num"><col class="col-b-blank">`).join('')}</colgroup>
        <thead><tr>${Array(4).fill(0).map(()=>`<th colspan="2" class="th-a">A</th><th colspan="2" class="th-b">B</th>`).join('')}</tr></thead>
        <tbody>${buildRunningScore(st)}</tbody>
      </table>
    </div>
  </div>
  <div class="sheet-footer">
    <table class="qs-table">
      <thead><tr>
        <th style="width:70px;text-align:left;padding-left:3px;">チーム</th>
        <th>1Q</th><th>2Q</th><th>3Q</th><th>4Q</th><th>OT</th>
        <th style="width:35px;">合計</th>
      </tr></thead>
      <tbody>
        <tr><td class="qs-name">${esc(teamAName)}</td>${st.qScore.A.map(s=>`<td>${s||0}</td>`).join('')}<td class="qs-total">${totalA}</td></tr>
        <tr><td class="qs-name">${esc(teamBName)}</td>${st.qScore.B.map(s=>`<td>${s||0}</td>`).join('')}<td class="qs-total">${totalB}</td></tr>
        <tr class="qs-winner">
          <td colspan="6" style="text-align:right;padding-right:6px;">勝利チーム: <strong>${winner}</strong></td>
          <td class="qs-total">${totalA} - ${totalB}</td>
        </tr>
      </tbody>
    </table>
  </div>
  <div class="sheet-signatures">
    <div class="sig-cell"><div class="sig-label">テーブルオフィシャルズ 署名</div><div class="sig-line"></div></div>
    <div class="sig-cell"><div class="sig-label">第1審 署名</div><div class="sig-line"></div></div>
    <div class="sig-cell"><div class="sig-label">第2審 署名</div><div class="sig-line"></div></div>
    <div class="sig-cell"><div class="sig-label">終了時間</div><div class="sig-line"></div></div>
  </div>
</div></div>`;
}

// =====================================================
// 起動
// =====================================================
function initApp() {
  const params = new URLSearchParams(window.location.search);
  const viewTournamentId = params.get('view');
  if (viewTournamentId) {
    openViewer(viewTournamentId);
  } else {
    loadTournaments();
  }
}
initApp();
</script>
</body>
</html>
