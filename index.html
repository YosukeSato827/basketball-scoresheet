<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バスケットボール スコアシート v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Poppins:wght@700;900&family=Klee+One:wght@400;600&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<style>
/* =====================================================
   Molten Brand Variables
   ===================================================== */
:root {
  --blue:       #005BAC;   /* Molten primary blue (Pantone 285C) */
  --blue-dark:  #004A8E;   /* hover/active */
  --blue-dim:   #E0EEF9;   /* light tint */
  --white:      #FFFFFF;
  --bg:         #F3F6FA;   /* page background */
  --text:       #1A1A2E;   /* main text */
  --text-mid:   #5A6A7A;   /* secondary text */
  --text-light: #9AAABB;   /* meta/hint */
  --border:     #DDE5EE;   /* subtle border */
  --shadow-sm:  0 1px 6px rgba(16,104,179,.08);
  --shadow-md:  0 4px 20px rgba(16,104,179,.13);
  --radius:     10px;
  --radius-sm:  6px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans JP','Meiryo','Yu Gothic',sans-serif;
  background: var(--bg); color: var(--text); font-size: 13px;
  -webkit-font-smoothing: antialiased;
}

/* =====================================================
   画面切り替え
   ===================================================== */
#view-tournaments { display: block; }
#view-detail      { display: none; }
#view-editor      { display: none; }

/* =====================================================
   共通ヘッダー
   ===================================================== */
.app-header {
  background: var(--blue); color: white;
  padding: 0 28px; height: 56px;
  display: flex; align-items: center; gap: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,.18);
}
.app-header h1 { display: none; } /* ロゴブロックで代替 */

/* Molten logo + ScoreLink */
.logo-block {
  display: flex; flex-direction: column; line-height: 1.1;
  flex: 1; gap: 2px;
}
.logo-wordmark {
  font-family: 'Poppins', sans-serif;
  font-weight: 600; font-size: 22px;
  color: white; letter-spacing: .02em;
  line-height: 1;
}
.logo-product {
  font-family: 'Poppins', sans-serif;
  font-size: 10px; font-weight: 500;
  color: rgba(255,255,255,.65);
  letter-spacing: .12em;
}
.logo-divider {
  width: 1px; height: 32px; background: rgba(255,255,255,.25);
  flex-shrink: 0; margin: 0 4px;
}
.btn-hdr {
  background: rgba(255,255,255,.14); color: white;
  border: 1px solid rgba(255,255,255,.35); border-radius: var(--radius-sm);
  padding: 6px 16px; font-size: 12px; font-weight: 700; cursor: pointer;
  white-space: nowrap; transition: background .15s;
}
.btn-hdr:hover { background: rgba(255,255,255,.26); }
.btn-hdr-primary {
  background: white; color: var(--blue);
  border: none; border-radius: var(--radius-sm);
  padding: 7px 18px; font-size: 12px; font-weight: 700; cursor: pointer;
  white-space: nowrap; transition: background .15s;
}
.btn-hdr-primary:hover { background: #dceefa; }

/* =====================================================
   大会一覧
   ===================================================== */
.page-body { padding: 28px 24px; max-width: 880px; margin: 0 auto; }

.section-eyebrow {
  font-size: 10px; font-weight: 700; letter-spacing: .12em;
  text-transform: uppercase; color: var(--text-light);
  margin-bottom: 16px;
}

.tournament-card {
  background: white; border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  padding: 20px 24px; margin-bottom: 12px;
  cursor: pointer;
  display: flex; align-items: center; gap: 20px;
  border-left: 3px solid transparent;
  transition: box-shadow .2s, border-color .2s;
}
.tournament-card:hover {
  box-shadow: var(--shadow-md);
  border-left-color: var(--blue);
}
.tc-icon { font-size: 28px; flex-shrink: 0; opacity: .85; }
.tc-info { flex: 1; min-width: 0; }
.tc-name {
  font-size: 17px; font-weight: 700; color: var(--text);
  margin-bottom: 4px;
}
.tc-meta { font-size: 12px; color: var(--text-mid); }
.tc-badges { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.tc-badge {
  display: inline-block; padding: 3px 10px;
  border-radius: 20px; font-size: 11px; font-weight: 700;
  background: var(--blue-dim); color: var(--blue);
}
.tc-actions { display: flex; gap: 8px; flex-shrink: 0; }
.btn-card {
  padding: 6px 14px; border: none; border-radius: var(--radius-sm);
  font-size: 12px; cursor: pointer; font-weight: 700;
  transition: opacity .15s;
}
.btn-card:hover { opacity: .82; }
.btn-open   { background: var(--blue); color: white; }
.btn-edit   { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
.btn-delete { background: white; color: #D32F2F; border: 1px solid #D32F2F; }

.empty-state {
  text-align: center; padding: 80px 20px;
  color: var(--text-light); font-size: 14px;
}
.empty-state span { font-size: 52px; display: block; margin-bottom: 16px; opacity: .6; }
.loading-msg { text-align: center; padding: 40px; color: var(--text-light); }

/* =====================================================
   大会詳細ヘッダー
   ===================================================== */
.detail-header {
  background: var(--blue); color: white;
  padding: 14px 28px 14px;
}
.detail-title {
  font-size: 20px; font-weight: 700;
  display: block; margin-bottom: 10px;
}
.detail-header-top {
  display: flex; align-items: center; gap: 10px;
}
.detail-meta { font-size: 12px; color: rgba(255,255,255,.75); margin-top: 8px; }

/* タブバー */
.tab-bar {
  display: flex; background: white;
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
}
.tab-btn {
  padding: 12px 22px; color: var(--text-mid);
  border: none; background: none; cursor: pointer;
  font-size: 13px; font-weight: 700;
  border-bottom: 3px solid transparent;
  margin-bottom: -1px; transition: color .15s;
}
.tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }
.tab-btn:hover:not(.active) { color: var(--text); }

/* =====================================================
   試合カード
   ===================================================== */
.game-card {
  background: white; border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  padding: 14px 20px; margin-bottom: 10px;
  display: flex; align-items: center; gap: 16px;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: box-shadow .2s, border-color .2s;
}
.game-card:hover { box-shadow: var(--shadow-md); border-left-color: var(--blue); }
.gc-info { flex: 1; min-width: 0; }
.gc-title { font-size: 11px; color: var(--text-light); font-weight: 500; letter-spacing: .06em; }
.gc-teams { font-size: 16px; font-weight: 700; margin-top: 2px; }
.gc-score {
  font-size: 24px; font-weight: 700; color: var(--blue);
  min-width: 90px; text-align: center; font-variant-numeric: tabular-nums;
}
.gc-actions { display: flex; gap: 8px; }

/* =====================================================
   ダッシュボード
   ===================================================== */
.dash-summary {
  display: grid; grid-template-columns: repeat(3,1fr);
  gap: 14px; margin-bottom: 28px;
}
.dash-kpi {
  background: white; border-radius: var(--radius);
  box-shadow: var(--shadow-sm); padding: 20px;
  text-align: center; border-top: 3px solid var(--blue);
}
.dash-kpi-val {
  font-size: 36px; font-weight: 700; color: var(--blue);
  line-height: 1; font-variant-numeric: tabular-nums;
}
.dash-kpi-label { font-size: 11px; color: var(--text-light); margin-top: 6px; font-weight: 500; letter-spacing: .04em; }

.dash-section { margin-bottom: 28px; }
.dash-section-title {
  font-size: 11px; font-weight: 700; color: var(--text-light);
  letter-spacing: .1em; text-transform: uppercase;
  padding-left: 10px; margin-bottom: 10px;
  border-left: 3px solid var(--blue);
}
.dash-table-wrap {
  background: white; border-radius: var(--radius);
  box-shadow: var(--shadow-sm); overflow: hidden;
}
.dash-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.dash-table th {
  background: var(--blue-dim); color: var(--blue);
  font-size: 11px; font-weight: 700; letter-spacing: .04em;
  padding: 9px 12px; text-align: left;
  border-bottom: 1px solid #C5DCF0;
}
.dash-table th.num { text-align: center; }
.dash-table td {
  padding: 10px 12px; border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.dash-table td.num { text-align: center; }
.dash-table tr:last-child td { border-bottom: none; }
.dash-table tr:hover td { background: #F7FBFF; }

.rank-badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 24px; height: 24px; border-radius: 50%;
  font-size: 11px; font-weight: 700;
  background: var(--border); color: var(--text-mid);
}
.rank-1 { background: #FFD700; color: #7A5800; }
.rank-2 { background: #C8CDD2; color: #444; }
.rank-3 { background: #CE8A55; color: #fff; }

.team-badge {
  display: inline-block; padding: 3px 9px;
  border-radius: 20px; font-size: 11px; font-weight: 700;
  background: var(--blue-dim); color: var(--blue);
}
.win-rate-bar { display: flex; align-items: center; gap: 8px; }
.win-rate-track { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.win-rate-fill  { height: 100%; background: var(--blue); border-radius: 3px; }
.result-win  { color: #1B7F3A; font-weight: 700; }
.result-lose { color: #C62828; }
.result-draw { color: var(--text-light); }
.dash-no-data { text-align: center; padding: 36px; color: var(--text-light); font-size: 13px; }

/* =====================================================
   統計フィルターバー
   ===================================================== */
.stats-filter-bar {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  padding: 10px 14px; margin-bottom: 20px;
  background: white; border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
}
.filter-label {
  font-size: 11px; font-weight: 700; color: var(--text-light);
  letter-spacing: .06em; white-space: nowrap;
}
.toggle-chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 13px; border-radius: 20px;
  font-size: 12px; font-weight: 600; font-family: inherit;
  border: 1.5px solid var(--border); background: var(--white);
  color: var(--text-mid); cursor: pointer; transition: all .15s;
}
.toggle-chip.active {
  background: var(--blue); border-color: var(--blue); color: white;
}
.toggle-chip:not(.active):hover { background: var(--bg); }
.filter-divider {
  width: 1px; height: 20px; background: var(--border); flex-shrink: 0;
}
.rank-switch {
  display: inline-flex;
  border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  overflow: hidden;
}
.rank-switch-btn {
  padding: 5px 13px; font-size: 12px; font-weight: 600; font-family: inherit;
  border: none; border-right: 1px solid var(--border);
  background: var(--white); color: var(--text-mid);
  cursor: pointer; transition: all .15s;
}
.rank-switch-btn:last-child { border-right: none; }
.rank-switch-btn.active { background: var(--blue); color: white; }
.rank-switch-btn:not(.active):hover { background: var(--bg); }

/* =====================================================
   モーダル
   ===================================================== */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(10,30,60,.45);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000; display: none; backdrop-filter: blur(2px);
}
.modal-overlay.open { display: flex; }
.modal {
  background: white; border-radius: var(--radius);
  padding: 28px 32px; width: 460px; max-width: 95vw;
  box-shadow: 0 12px 48px rgba(0,0,0,.18);
}
.modal h2 {
  font-size: 17px; font-weight: 700; color: var(--text);
  margin-bottom: 22px;
  padding-bottom: 14px; border-bottom: 1px solid var(--border);
}
.form-group { margin-bottom: 16px; }
.form-group label {
  display: block; font-size: 11px; font-weight: 700;
  margin-bottom: 5px; color: var(--text-mid);
  letter-spacing: .04em; text-transform: uppercase;
}
.form-group input, .form-group textarea {
  width: 100%; padding: 9px 12px;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-size: 13px; font-family: inherit; color: var(--text);
  transition: border-color .15s;
}
.form-group input:focus, .form-group textarea:focus {
  outline: none; border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(16,104,179,.12);
}
.form-group textarea { height: 80px; resize: vertical; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }
.btn-modal-cancel {
  padding: 9px 20px; border: 1px solid var(--border);
  border-radius: var(--radius-sm); background: white;
  cursor: pointer; font-size: 13px; color: var(--text-mid);
  font-weight: 500;
}
.btn-modal-cancel:hover { background: var(--bg); }
.btn-modal-save {
  padding: 9px 24px; border: none;
  border-radius: var(--radius-sm); background: var(--blue);
  color: white; cursor: pointer; font-size: 13px; font-weight: 700;
}
.btn-modal-save:hover { background: var(--blue-dark); }

/* =====================================================
   トースト
   ===================================================== */
#toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  background: #1A1A2E; color: white; padding: 11px 26px;
  border-radius: 8px; font-size: 13px; z-index: 9999;
  opacity: 0; transition: opacity .3s; pointer-events: none;
  box-shadow: 0 4px 20px rgba(0,0,0,.25);
  white-space: nowrap;
}
#toast.show { opacity: 1; }

/* =====================================================
   エディター
   ===================================================== */
.editor-toolbar {
  background: var(--blue); color: white;
  padding: 0 20px; height: 52px;
  display: flex; align-items: center; gap: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,.15);
}
.btn-back {
  background: rgba(255,255,255,.14); color: white;
  border: 1px solid rgba(255,255,255,.35); border-radius: var(--radius-sm);
  padding: 6px 14px; font-size: 12px; cursor: pointer; font-weight: 700;
}
.btn-back:hover { background: rgba(255,255,255,.26); }
.toolbar-title {
  flex: 1; font-size: 14px; font-weight: 700;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.btn-save {
  background: #1E9E4A; color: white; border: none;
  border-radius: var(--radius-sm);
  padding: 7px 18px; font-size: 13px; font-weight: 700; cursor: pointer;
  transition: background .15s;
}
.btn-save:hover { background: #167A38; }
.btn-save:disabled { background: #9AAABB; cursor: default; }
.btn-print-small {
  background: rgba(255,255,255,.14); color: white;
  border: 1px solid rgba(255,255,255,.35); border-radius: var(--radius-sm);
  padding: 6px 14px; font-size: 12px; cursor: pointer; font-weight: 700;
}

.input-section {
  background: white; padding: 20px 24px; margin: 16px 20px;
  border-radius: var(--radius); box-shadow: var(--shadow-sm);
}
.input-grid {
  display: grid; grid-template-columns: repeat(3,1fr);
  gap: 14px; margin-bottom: 14px;
}
.input-grid label {
  display: block; font-size: 10px; font-weight: 700;
  margin-bottom: 5px; color: var(--text-mid);
  letter-spacing: .06em; text-transform: uppercase;
}
.input-grid input {
  width: 100%; padding: 8px 10px;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-size: 13px; font-family: inherit; color: var(--text);
  transition: border-color .15s;
}
.input-grid input:focus {
  outline: none; border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(16,104,179,.1);
}
.pbp-label {
  display: block; font-size: 10px; font-weight: 700;
  margin-bottom: 6px; color: var(--text-mid);
  letter-spacing: .06em; text-transform: uppercase;
}
textarea#pbpInput {
  width: 100%; height: 130px; padding: 10px 12px;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-size: 12px; font-family: 'Consolas',monospace; resize: vertical;
  color: var(--text);
}
textarea#pbpInput:focus {
  outline: none; border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(16,104,179,.1);
}
.btn-row { margin-top: 12px; display: flex; gap: 10px; align-items: center; }
.btn {
  padding: 9px 22px; font-size: 13px; border: none;
  border-radius: var(--radius-sm); cursor: pointer; font-weight: 700;
}
.btn-gen { background: var(--blue); color: white; }
.btn-gen:hover { background: var(--blue-dark); }
.hint { font-size: 11px; color: var(--text-light); }

/* =====================================================
   スコアシート本体
   ===================================================== */
.sheet-outer { background: white; margin: 0 16px 16px; padding: 4px; box-shadow: 0 2px 10px rgba(0,0,0,.15); }
.sheet {
  width: 575px; font-family: 'Meiryo','Yu Gothic','MS Gothic',sans-serif;
  font-size: 6.5pt; border: 2px solid rgba(52,38,24,0.75);
  position: relative; background: white; filter: url(#pencil);
}
.team-name-val, .info-cell, .pr-name, .coach-label { font-family: 'Klee One','Meiryo',cursive; }
td.a-blank, td.b-blank { font-family: 'Caveat','Klee One',cursive; }
.pr-foul.foul-used { font-family: 'Caveat',cursive; }
.q-box.used { font-family: 'Caveat',cursive; }
.sheet-header { display: flex; border-bottom: 1.5px solid rgba(52,38,24,0.75); }
.header-title-block { width: 295px; flex-shrink: 0; border-right: 1px solid rgba(52,38,24,0.75); padding: 2px 4px; }
.sheet-title { font-size: 14pt; font-weight: bold; letter-spacing: 1px; line-height: 1.2; white-space: nowrap; }
.sheet-subtitle { font-size: 5.5pt; color: #444; margin-top: 1px; }
.header-info-block { flex: 1; display: flex; flex-direction: column; }
.info-row { display: flex; border-bottom: 1px solid rgba(52,38,24,0.75); }
.info-row:last-child { border-bottom: none; }
.info-cell { flex: 1; padding: 1px 3px; font-size: 6pt; border-right: 1px solid rgba(120,95,70,0.45); }
.info-cell:last-child { border-right: none; }
.info-cell label { color: #555; }
.sheet-main { display: flex; border-bottom: 1.5px solid rgba(52,38,24,0.75); }
.left-panel { width: 295px; flex-shrink: 0; border-right: 1.5px solid rgba(52,38,24,0.75); display: flex; flex-direction: column; }
.team-section { flex: 1; border-bottom: 1.5px solid rgba(52,38,24,0.75); }
.team-section:last-child { border-bottom: none; }
.team-name-row { display: flex; align-items: stretch; border-bottom: 1px solid rgba(52,38,24,0.75); background: white; }
.team-label-cell { font-size: 6pt; font-weight: bold; padding: 1px 3px; border-right: 1px solid rgba(52,38,24,0.75); white-space: nowrap; display: flex; align-items: center; }
.team-name-val { flex: 1; font-size: 7pt; font-weight: bold; padding: 1px 4px; display: flex; align-items: center; }
.timeout-fouls-header { display: flex; border-bottom: 1px solid rgba(52,38,24,0.75); }
.to-block, .tf-block { flex: 1; padding: 1px 2px; }
.to-block { border-right: 1px solid rgba(52,38,24,0.75); }
.block-title { font-size: 5.5pt; font-weight: bold; color: #333; }
.quarter-rows { margin-top: 1px; }
.qrow { display: flex; align-items: center; gap: 2px; font-size: 5.5pt; margin-bottom: 1px; }
.q-period { display: flex; align-items: center; gap: 1px; margin-right: 4px; }
.q-period-label { font-weight: bold; font-size: 5pt; }
.q-box { width: 11px; height: 8px; border: 1px solid rgba(120,95,70,0.5); font-size: 5pt; text-align: center; line-height: 8px; background: white; }
.q-box.used { font-weight: bold; }
.q-box.tf-used { text-decoration: line-through; }
.foul-header-row { display: flex; border-top: 1px solid rgba(52,38,24,0.75); border-bottom: 1px solid rgba(52,38,24,0.75); background: white; font-size: 5pt; font-weight: bold; }
.foul-header-row > div { text-align: center; padding: 1px 0; border-right: 1px solid rgba(120,95,70,0.45); }
.foul-header-row > div:last-child { border-right: none; }
.col-no { width: 16px; } .col-lic { width: 28px; } .col-name { flex: 1; text-align: left; padding-left: 2px; }
.col-hash { width: 16px; } .col-in { width: 16px; } .col-f { width: 13px; }
.player-rows { display: flex; flex-direction: column; }
.player-row { display: flex; align-items: center; border-bottom: 1px solid rgba(120,95,70,0.35); min-height: 14px; }
.player-row:last-child { border-bottom: none; }
.player-row > div { font-size: 6pt; text-align: center; border-right: 1px solid rgba(120,95,70,0.35); padding: 0; line-height: 14px; height: 14px; overflow: hidden; }
.player-row > div:last-child { border-right: none; }
.player-row > div.pr-name { text-align: left; padding-left: 2px; font-size: 6pt; }
.pr-foul.foul-used { font-weight: bold; text-decoration: line-through; }
.coach-rows { border-top: 1px solid rgba(52,38,24,0.75); font-size: 5.5pt; }
.coach-row { display: flex; align-items: center; border-bottom: 1px solid rgba(120,95,70,0.35); height: 14px; padding: 0 3px; }
.coach-row:last-child { border-bottom: none; }
.coach-label { font-weight: bold; margin-right: 4px; white-space: nowrap; }
.coach-sig { flex: 1; border-bottom: 1px solid rgba(120,95,70,0.45); height: 8px; margin: 1px 0; }
.right-panel { flex: 1; overflow: hidden; }
.running-label { text-align: center; font-size: 6pt; font-weight: bold; border-bottom: 1px solid rgba(52,38,24,0.75); padding: 1px; background: white; }
.running-score-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
.running-score-table th, .running-score-table td { border: 1px solid rgba(120,95,70,0.45); padding: 0; text-align: center; height: 17px; line-height: 17px; overflow: hidden; }
.running-score-table th { background: white; font-size: 5.5pt; font-weight: bold; height: 11px; line-height: 11px; }
.col-a-blank { width: 21px; } .col-num { width: 12px; font-size: 5.5pt; color: #666; background: white; } .col-b-blank { width: 21px; }
td.a-blank, td.b-blank { font-size: 7pt; font-weight: 700; }
td.q1 span, td.q3 span { color: #c62828; }
td.q2 span, td.q4 span { color: #1565c0; }
td.qot span { color: #6a1b9a; }
.sheet-footer { display: flex; border-bottom: 1.5px solid rgba(52,38,24,0.75); }
.qs-table { width: 100%; border-collapse: collapse; }
.qs-table th, .qs-table td { border: 1px solid rgba(120,95,70,0.45); font-size: 6pt; text-align: center; padding: 1px 2px; height: 13px; line-height: 13px; }
.qs-table th { background: white; font-weight: bold; }
.qs-name { text-align: left; padding-left: 3px; font-weight: bold; }
.qs-total { font-weight: bold; font-size: 7pt; }
.qs-winner td { font-weight: bold; }
.sheet-signatures { display: flex; border-bottom: 1.5px solid rgba(52,38,24,0.75); }
.sig-cell { flex: 1; font-size: 5.5pt; padding: 1px 3px; border-right: 1px solid rgba(120,95,70,0.45); min-height: 18px; }
.sig-cell:last-child { border-right: none; }
.sig-label { color: #555; }
.sig-line { border-bottom: 1px solid rgba(120,95,70,0.45); margin-top: 8px; }

@media print {
  body { background: white; }
  .editor-toolbar, .input-section, #view-tournaments, #view-detail { display: none !important; }
  .sheet-outer { margin: 0; padding: 0; box-shadow: none; }
  .sheet { width: 100%; }
  @page { size: A4 portrait; margin: 8mm; }
}

/* =====================================================
   モバイル対応（〜600px）
   ===================================================== */
@media (max-width: 600px) {
  /* 共通余白を縮小 */
  .page-body { padding: 14px 12px; }
  .app-header { padding: 0 14px; height: 50px; }

  /* 大会詳細ヘッダー */
  .detail-header { padding: 10px 14px 12px; }
  .detail-title { font-size: 17px; margin-bottom: 8px; }
  .detail-header-top { gap: 8px; }

  /* タブバー */
  .tab-bar { padding: 0 8px; }
  .tab-btn { padding: 10px 16px; font-size: 12px; }

  /* ゲームカード */
  .game-card { padding: 10px 12px; gap: 10px; }
  .gc-score { min-width: 72px; font-size: 20px; }
  .gc-teams { font-size: 14px; }

  /* 大会一覧カード */
  .tc-card { padding: 14px 16px; }

  /* KPI カード */
  .dash-summary { gap: 8px; }
  .dash-kpi { padding: 12px 6px; }
  .dash-kpi-val { font-size: 26px; }
  .dash-kpi-label { font-size: 10px; }

  /* テーブル：横スクロールさせて折り返し防止 */
  .dash-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .dash-table { min-width: 520px; }
  .dash-table th, .dash-table td { white-space: nowrap; }

  /* フィルターバー */
  .stats-filter-bar { padding: 8px 10px; gap: 6px; }
  .filter-label { font-size: 10px; }
  .toggle-chip { padding: 4px 10px; font-size: 11px; }
  .rank-switch-btn { padding: 4px 10px; font-size: 11px; }

  /* エディタツールバー */
  .editor-toolbar { padding: 0 10px; gap: 6px; }
  .toolbar-title { font-size: 13px; }
}

/* =====================================================
   得点推移グラフ
   ===================================================== */
.score-graph-wrap {
  background: white; border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  padding: 16px 20px 10px; margin-bottom: 16px;
}
.score-graph-title {
  font-size: 11px; font-weight: 700;
  color: var(--text-light); letter-spacing: .1em;
  text-transform: uppercase; padding-left: 10px;
  margin-bottom: 10px; border-left: 3px solid var(--blue);
}
@media print { .score-graph-wrap { display: none !important; } }

/* =====================================================
   スマホプレビューモード（PCからの確認用）
   ===================================================== */
.preview-toggle-btn {
  position: fixed; bottom: 24px; right: 24px; z-index: 9999;

}
.preview-toggle-btn:hover { background: #2c2c44; transform: translateY(-1px); }
.preview-toggle-btn.active { background: var(--blue); }

/* プレビュー時の背景 */

  background: #555;
}
/* アプリフレームをスマホ幅に制限 */

  width: 375px;
  min-height: 100vh;
  margin: 0 auto;
  background: var(--bg);
  box-shadow: 0 0 60px rgba(0,0,0,.5);

}
/* スマホプレビュー時はメディアクエリを強制適用 */
body.mobile-preview-mode .page-body { padding: 14px 12px; }
body.mobile-preview-mode .app-header { padding: 0 14px; height: 50px; }
body.mobile-preview-mode .detail-header { padding: 10px 14px 12px; }
body.mobile-preview-mode .detail-title { font-size: 17px; margin-bottom: 8px; }
body.mobile-preview-mode .detail-header-top { gap: 8px; }
body.mobile-preview-mode .tab-bar { padding: 0 8px; }
body.mobile-preview-mode .tab-btn { padding: 10px 16px; font-size: 12px; }
body.mobile-preview-mode .game-card { padding: 10px 12px; gap: 10px; }
body.mobile-preview-mode .gc-score { min-width: 72px; font-size: 20px; }
body.mobile-preview-mode .gc-teams { font-size: 14px; }
body.mobile-preview-mode .dash-summary { gap: 8px; }
body.mobile-preview-mode .dash-kpi { padding: 12px 6px; }
body.mobile-preview-mode .dash-kpi-val { font-size: 26px; }
body.mobile-preview-mode .dash-kpi-label { font-size: 10px; }
body.mobile-preview-mode .dash-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
body.mobile-preview-mode .dash-table { min-width: 520px; }
body.mobile-preview-mode .dash-table th,
body.mobile-preview-mode .dash-table td { white-space: nowrap; }
body.mobile-preview-mode .stats-filter-bar { padding: 8px 10px; gap: 6px; }
body.mobile-preview-mode .toggle-chip { padding: 4px 10px; font-size: 11px; }
body.mobile-preview-mode .rank-switch-btn { padding: 4px 10px; font-size: 11px; }
body.mobile-preview-mode .editor-toolbar { padding: 0 10px; gap: 6px; }
body.mobile-preview-mode .toolbar-title { font-size: 13px; }

/* プレビューモード時は印刷ボタンを非表示 */
@media print {
  .preview-toggle-btn { display: none; }
}

/* =====================================================
   閲覧専用ビュー（?view=GAME_ID）
   ===================================================== */
#view-viewer { display: none; min-height: 100vh; }

.viewer-header {
  background: var(--blue); color: white;
  padding: 0 28px; height: 56px;
  display: flex; align-items: center; gap: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,.18);
  position: sticky; top: 0; z-index: 100;
}
.viewer-live-badge {
  display: flex; align-items: center; gap: 6px;
  background: #E53935; color: white;
  border-radius: 20px; padding: 3px 12px;
  font-size: 11px; font-weight: 700; letter-spacing: .08em;
}
.viewer-live-dot {
  width: 7px; height: 7px; border-radius: 50%; background: white;
  animation: pulse-dot 1.2s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%       { opacity: .4; transform: scale(.65); }
}
.viewer-updated {
  font-size: 11px; color: rgba(255,255,255,.6); margin-left: auto;
}
.viewer-body { padding: 24px; max-width: 920px; margin: 0 auto; }
.viewer-game-info {
  text-align: center; margin-bottom: 16px;
  color: var(--text-mid); font-size: 13px;
}
.viewer-tournament-name {
  font-size: 11px; font-weight: 700; letter-spacing: .1em;
  color: var(--text-light); text-transform: uppercase; margin-bottom: 4px;
}
.viewer-scoreboard {
  background: white; border-radius: var(--radius);
  box-shadow: var(--shadow-md);
  padding: 32px 24px; margin-bottom: 20px;

}
.vsb-team { flex: 1; text-align: center; }
.vsb-name {
  font-size: 14px; font-weight: 700; color: var(--text-mid);
  margin-bottom: 8px; letter-spacing: .04em;
}
.vsb-score {
  font-family: 'Poppins', sans-serif;
  font-size: 76px; font-weight: 900; line-height: 1; color: var(--text);
}
.vsb-score.leading { color: var(--blue); }
.vsb-sep {
  padding: 0 24px; display: flex; flex-direction: column;
  align-items: center; gap: 10px;
}
.vsb-vs { font-size: 20px; font-weight: 700; color: var(--text-light); }
.vsb-quarter {
  background: var(--blue-dim); color: var(--blue);
  border-radius: var(--radius-sm); padding: 5px 14px;
  font-size: 13px; font-weight: 700;
}
.vsb-qscores {
  margin-top: 20px; display: flex; justify-content: center;
  gap: 0; border-top: 1px solid var(--border); padding-top: 16px;
}
.vsb-qcell {
  text-align: center; min-width: 52px;
  border-right: 1px solid var(--border); padding: 0 8px;
}
.vsb-qcell:last-child { border-right: none; }
.vsb-qcell-label { font-size: 10px; color: var(--text-light); margin-bottom: 4px; }
.vsb-qcell-scores { display: flex; gap: 8px; justify-content: center; }
.vsb-qcell-a { font-size: 14px; font-weight: 700; color: var(--blue); }
.vsb-qcell-b { font-size: 14px; font-weight: 700; color: #E53935; }
.viewer-section-label {
  font-size: 11px; font-weight: 700; color: var(--text-light);
  letter-spacing: .1em; text-transform: uppercase;
  padding-left: 10px; margin-bottom: 10px;
  border-left: 3px solid var(--blue);
}
.viewer-error {
  text-align: center; padding: 80px 24px; color: var(--text-mid);
}
.viewer-error h2 { font-size: 22px; margin-bottom: 8px; }
/* ゲームカードの閲覧URLボタン */
.btn-view-url {
  background: var(--blue-dim); color: var(--blue);
  border: 1px solid var(--blue); border-radius: var(--radius-sm);
  padding: 4px 10px; font-size: 11px; font-weight: 700; cursor: pointer;
  white-space: nowrap; transition: background .15s;
}
.btn-view-url:hover { background: #c5dff6; }
@media (max-width: 600px) {
  .vsb-score { font-size: 56px; }
  .vsb-sep { padding: 0 12px; }
  .viewer-body { padding: 14px; }
}
/* 大会単位 閲覧ビュー: 試合カード */
.vt-game-list { display: flex; flex-direction: column; gap: 12px; }
.vt-game-detail {
  background: white; border-radius: var(--radius);
  box-shadow: var(--shadow-sm); overflow: hidden;
}
.vt-game-detail summary { list-style: none; }
.vt-game-detail summary::-webkit-details-marker { display: none; }
.vt-game-summary {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 20px; cursor: pointer;
  transition: background .15s; user-select: none;
}
.vt-game-summary:hover { background: var(--bg); }
.vt-summary-inner { flex: 1; min-width: 0; }
.vt-game-label {
  font-size: 11px; font-weight: 700; color: var(--text-light);
  letter-spacing: .08em; margin-bottom: 8px;
  display: flex; align-items: center; gap: 8px;
}
.vt-live-chip {
  background: #E53935; color: white;
  border-radius: 10px; padding: 1px 7px;
  font-size: 10px; font-weight: 700;
}
.vt-scoreline {
  display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap;
}
.vt-team-name { font-size: 14px; font-weight: 700; color: var(--text-mid); }
.vt-team-name.vt-winner { color: var(--blue); }
.vt-score-a, .vt-score-b {
  font-family: 'Poppins', sans-serif;
  font-size: 38px; font-weight: 900; line-height: 1; color: var(--text);
}
.vt-score-a.vt-winner, .vt-score-b.vt-winner { color: var(--blue); }
.vt-dash { font-size: 22px; color: var(--text-light); font-weight: 300; }
.vt-qlabel {
  font-size: 11px; font-weight: 700; color: var(--text-light);
  background: var(--bg); border-radius: var(--radius-sm);
  padding: 2px 8px; margin-left: 4px;
}
.vt-qrow {
  display: flex; gap: 0; margin-top: 10px;
  border-top: 1px solid var(--border); padding-top: 10px;
}
.vt-qcell {
  display: flex; align-items: center; gap: 3px;
  padding: 0 10px; border-right: 1px solid var(--border);
}
.vt-qcell:last-child { border-right: none; }
.vt-qcell-label { color: var(--text-light); font-size: 10px; margin-right: 2px; }
.vt-qcell-a { font-size: 12px; font-weight: 700; color: var(--blue); }
.vt-qcell-b { font-size: 12px; font-weight: 700; color: #E53935; }
.vt-qcell-sep { font-size: 10px; color: var(--border); }
.vt-expand-icon {
  color: var(--text-light); font-size: 12px;
  transition: transform .2s; flex-shrink: 0;
}
details[open] .vt-expand-icon { transform: rotate(180deg); }
.vt-game-body {
  border-top: 1px solid var(--border);
  padding: 16px 20px;
}
@media (max-width: 600px) {
  .vt-score-a, .vt-score-b { font-size: 28px; }
  .vt-game-summary { padding: 12px 14px; }
  .vt-game-body { padding: 12px 14px; }
  .vt-qcell { padding: 0 6px; }
}

/* =====================================================
   ライブ記録ビュー
   ===================================================== */
#view-recorder { display: none; min-height: 100vh; background: var(--bg); }
.btn-live {
  background: #E53935; color: white; border: none;
  border-radius: var(--radius-sm); padding: 6px 14px;
  font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap;
}
.btn-live:hover { background: #c62828; }
.players-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px;
}
.players-grid textarea { height: 110px; resize: vertical; font-size: 12px; font-family: monospace; }

/* レコーダー ヘッダー */
.rec-header {
  background: var(--blue); color: white;
  display: flex; align-items: center; gap: 10px;
  padding: 0 14px; height: 50px;
  position: sticky; top: 0; z-index: 50;
}
.rec-back { background: rgba(255,255,255,.18); color: white; border: none; border-radius: var(--radius-sm); padding: 6px 12px; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; }
.rec-title { flex: 1; font-weight: 700; font-size: 14px; text-align: center; }
.rec-status { font-size: 11px; color: rgba(255,255,255,.8); white-space: nowrap; min-width: 60px; text-align: right; }

/* スコアボード */
.rec-scoreboard {
  background: var(--blue-dark); color: white;
  display: flex; align-items: center; justify-content: center; gap: 14px;
  padding: 10px 20px;
}
.rec-score-team { text-align: center; min-width: 120px; }
.rec-score-name { font-size: 11px; font-weight: 700; opacity: .75; letter-spacing: .06em; margin-bottom: 2px; }
.rec-score-val {
  font-family: 'Poppins', sans-serif; font-size: 48px;
  font-weight: 900; line-height: 1;
}
.rec-score-sep { font-size: 22px; font-weight: 300; opacity: .5; }

/* クォーター選択バー */
.rec-q-bar {
  display: flex; background: var(--blue-dark);
  padding: 6px 12px 8px; gap: 6px;
}
.rec-q-btn {
  flex: 1; background: rgba(255,255,255,.15); color: white;
  border: none; border-radius: var(--radius-sm); padding: 7px 0;
  font-size: 13px; font-weight: 700; cursor: pointer; transition: background .15s;
}
.rec-q-btn.active { background: white; color: var(--blue); }
.rec-q-btn:hover:not(.active) { background: rgba(255,255,255,.28); }

/* 選手グリッドエリア */
.rec-players {
  display: flex; gap: 0; padding: 10px 8px;
  flex: 1;
}
.rec-team { flex: 1; min-width: 0; }
.rec-team-label {
  font-size: 10px; font-weight: 700; color: var(--text-light);
  letter-spacing: .08em; text-align: center; margin-bottom: 6px;
  text-transform: uppercase; padding: 0 4px;
}
.rec-divider { width: 1px; background: var(--border); margin: 0 6px; }
.rec-player-grid { display: flex; flex-direction: column; gap: 7px; overflow-y: auto; padding: 0 4px; }
.rec-player-btn {
  background: white; border: 2px solid var(--border); border-radius: var(--radius);
  padding: 9px 6px; cursor: pointer; text-align: center;
  transition: all .1s; width: 100%;
}
.rec-player-btn:active { background: var(--blue-dim); border-color: var(--blue); transform: scale(.96); }
.rec-player-num { display: block; font-family: 'Poppins', sans-serif; font-size: 19px; font-weight: 700; color: var(--blue); line-height: 1.1; }
.rec-player-name { display: block; font-size: 11px; color: var(--text-mid); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rec-add-btn {
  background: var(--bg); border: 2px dashed var(--border); border-radius: var(--radius);
  padding: 8px; font-size: 18px; color: var(--text-light); cursor: pointer; width: 100%;
}
.rec-add-btn:hover { border-color: var(--blue); color: var(--blue); }
.rec-no-players { text-align: center; color: var(--text-light); font-size: 12px; padding: 12px 4px; }
.rec-add-player-inline {
  background: var(--blue-dim); color: var(--blue); border: none;
  border-radius: var(--radius-sm); padding: 6px 8px;
  font-size: 11px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 6px;
}

/* タイマーバー */
.rec-timer-bar {
  position: sticky; bottom: 0;
  background: white; border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px; padding: 8px 14px;
  box-shadow: 0 -2px 8px rgba(0,0,0,.08);
}
.rec-undo-btn {
  background: #fff3e0; color: #e65100; border: 1px solid #ffcc80;
  border-radius: var(--radius-sm); padding: 8px 10px;
  font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap;
}
.rec-timer-wrap { display: flex; align-items: center; gap: 6px; margin-left: auto; }
.rec-timer-display {
  font-family: 'Poppins', sans-serif; font-size: 22px; font-weight: 700;
  color: var(--text); background: none; border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 2px 8px; cursor: pointer; min-width: 72px; text-align: center;
}
.rec-timer-btn {
  background: var(--blue); color: white; border: none; border-radius: 50%;
  width: 34px; height: 34px; font-size: 13px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.rec-timer-reset {
  background: var(--bg); color: var(--text-mid); border: 1px solid var(--border);
  border-radius: 50%; width: 28px; height: 28px; font-size: 13px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}

/* アクションシート */
.rec-action-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.5); z-index: 300; align-items: flex-end;
}
.rec-action-overlay.show { display: flex; }
.rec-action-sheet {
  background: white; border-radius: 16px 16px 0 0;
  width: 100%; padding: 20px 16px calc(env(safe-area-inset-bottom) + 28px);
}
.rec-action-player {
  font-size: 15px; font-weight: 700; text-align: center;
  margin-bottom: 16px; color: var(--text-mid);
}
.rec-action-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px;
}
.rec-action-btn {
  padding: 15px 8px; border-radius: var(--radius);
  font-size: 14px; font-weight: 700; cursor: pointer; border: none;
  transition: opacity .1s;
}
.rec-action-btn:active { opacity: .72; transform: scale(.97); }
.act-success { background: #e8f5e9; color: #2e7d32; }
.act-neutral { background: var(--bg); color: var(--text-mid); border: 1px solid var(--border); }
.act-warn    { background: #fff3e0; color: #e65100; }
.act-info    { background: var(--blue-dim); color: var(--blue); }
.rec-action-cancel {
  width: 100%; padding: 13px; background: var(--bg); color: var(--text-mid);
  border: none; border-radius: var(--radius); font-size: 14px; font-weight: 700; cursor: pointer;
}
/* 試合終了ボタン */
.rec-end-btn {
  background: rgba(255,255,255,.18); color: white;
  border: 1px solid rgba(255,255,255,.45); border-radius: var(--radius-sm);
  padding: 5px 10px; font-size: 11px; font-weight: 700; cursor: pointer; white-space: nowrap;
}
/* アクションボタンエリア（3カラム） */
.rec-3col { display: flex; border-top: 1px solid var(--border); }
.rec-team-col {
  flex: 0 0 82px; display: flex; flex-direction: column;
  gap: 5px; padding: 7px 5px; min-width: 0;
  border-right: 1px solid var(--border);
}
.rec-team-col-b { border-right: none; border-left: 1px solid var(--border); }
.rec-team-col-label {
  font-size: 10px; font-weight: 700; color: var(--text-light); text-align: center;
  letter-spacing: .07em; text-transform: uppercase;
  padding-bottom: 5px; border-bottom: 2px solid var(--border);
}
.rec-act-btn {
  padding: 10px 2px; border: none; border-radius: var(--radius);
  font-size: 12px; font-weight: 700; cursor: pointer; width: 100%;
  transition: opacity .1s;
}
.rec-act-btn:active { opacity: .72; transform: scale(.97); }
.rec-act-scoring { background: #e8f5e9; color: #2e7d32; }
.rec-act-foul    { background: #fff3e0; color: #e65100; }
.rec-act-timeout { background: var(--blue-dim); color: var(--blue); }
.rec-sub-btn {
  background: var(--bg); color: var(--text-mid);
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 8px 2px; font-size: 12px; font-weight: 700; cursor: pointer; width: 100%;
  margin-top: 2px;
}
.rec-sub-btn:active { border-color: var(--blue); color: var(--blue); }
/* PBP中央カラム */
.rec-pbp-col {
  flex: 1; min-width: 0; display: flex; flex-direction: column; background: var(--bg);
}
.rec-pbp-header {
  font-size: 9px; font-weight: 700; color: var(--text-light);
  letter-spacing: .1em; text-transform: uppercase;
  padding: 5px 7px 4px; border-bottom: 1px solid var(--border);
  background: white; flex-shrink: 0;
}
.rec-pbp-feed {
  flex: 1; overflow-y: auto; max-height: 290px; min-height: 140px;
}
.rec-pbp-entry {
  padding: 5px 7px; border-bottom: 1px solid var(--border);
  cursor: pointer; border-left: 3px solid transparent;
}
.rec-pbp-entry:active { background: rgba(0,0,0,.05); }
.rec-pbp-entry.pbp-a { border-left-color: var(--blue); }
.rec-pbp-entry.pbp-b { border-left-color: #E53935; }
.rec-pbp-time { font-size: 9px; color: var(--text-light); font-family: 'Poppins', sans-serif; }
.rec-pbp-text { font-size: 11px; font-weight: 600; color: var(--text); word-break: break-all; }
.rec-pbp-text.pbp-a { color: var(--blue); }
.rec-pbp-text.pbp-b { color: #E53935; }
.rec-pbp-empty {
  text-align: center; color: var(--text-light); font-size: 11px;
  padding: 24px 8px; line-height: 1.6;
}
/* 選手不明ボタン */
.rec-psel-unknown {
  background: var(--bg) !important; border: 2px dashed var(--border) !important;
}
/* ラインアップ選択オーバーレイ */
.rec-lineup-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.6); z-index: 400; align-items: flex-end;
}
.rec-lineup-overlay.show { display: flex; }
.rec-lineup-sheet {
  background: white; border-radius: 20px 20px 0 0;
  width: 100%; padding: 20px 16px calc(env(safe-area-inset-bottom) + 16px);
  max-height: 82vh; display: flex; flex-direction: column;
}
.rec-lineup-title {
  font-size: 16px; font-weight: 700; text-align: center; margin-bottom: 3px;
}
.rec-lineup-sub {
  font-size: 12px; color: var(--text-mid); text-align: center; margin-bottom: 12px;
}
.rec-lineup-chips {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
  gap: 7px; overflow-y: auto; flex: 1; margin-bottom: 10px; padding: 2px;
}
.rec-lineup-chip {
  border: 2px solid var(--border); border-radius: var(--radius);
  padding: 10px 4px; cursor: pointer; text-align: center;
  display: flex; flex-direction: column; gap: 2px; align-items: center;
  transition: all .12s; background: white;
}
.rec-lineup-chip.selected { border-color: var(--blue); background: var(--blue-dim); }
.rec-lineup-chip.selected .rec-psel-num { color: var(--blue); }
.rec-lineup-count {
  font-size: 12px; color: var(--text-mid); text-align: center; margin-bottom: 10px;
}
.rec-lineup-next-btn {
  width: 100%; padding: 13px; background: var(--blue); color: white;
  border: none; border-radius: var(--radius); font-size: 15px; font-weight: 700;
  cursor: pointer; margin-bottom: 7px;
}
.rec-lineup-skip {
  width: 100%; padding: 9px; background: var(--bg); color: var(--text-mid);
  border: none; border-radius: var(--radius); font-size: 12px; font-weight: 700;
  cursor: pointer;
}
/* PBP編集オーバーレイ */
.rec-pbpedit-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.5); z-index: 350; align-items: flex-end;
}
.rec-pbpedit-overlay.show { display: flex; }
.rec-pbpedit-sheet {
  background: white; border-radius: 16px 16px 0 0;
  width: 100%; padding: 20px 16px calc(env(safe-area-inset-bottom) + 16px);
  max-height: 78vh; display: flex; flex-direction: column;
}
.rec-pbpedit-info {
  font-size: 13px; font-weight: 600; text-align: center;
  padding: 8px 12px; border-radius: var(--radius-sm); margin-bottom: 14px;
}
.rec-pbpedit-info.pbp-a { background: var(--blue-dim); color: var(--blue); }
.rec-pbpedit-info.pbp-b { background: #ffebee; color: #E53935; }
.rec-pbpedit-section {
  font-size: 10px; font-weight: 700; color: var(--text-light);
  letter-spacing: .07em; text-transform: uppercase; margin-bottom: 8px;
}
.rec-pbpedit-delete {
  width: 100%; padding: 11px; background: #ffebee; color: #c62828;
  border: none; border-radius: var(--radius); font-size: 14px; font-weight: 700;
  cursor: pointer; margin-top: 10px; margin-bottom: 7px;
}
.rec-pbpedit-cancel {
  width: 100%; padding: 10px; background: var(--bg); color: var(--text-mid);
  border: none; border-radius: var(--radius); font-size: 13px; font-weight: 700;
  cursor: pointer;
}
/* コート表示 */
.rec-court {
  background: white; border-top: 1px solid var(--border);
  padding: 7px 12px; display: flex; flex-direction: column; gap: 4px;
}
.rec-court-team { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; min-height: 22px; }
.rec-court-label { font-size: 10px; font-weight: 700; color: var(--text-light); letter-spacing: .06em; text-transform: uppercase; white-space: nowrap; min-width: 40px; }
.rec-court-player { font-family: 'Poppins', sans-serif; font-size: 11px; font-weight: 700; border: 1.5px solid; border-radius: 20px; padding: 1px 7px; white-space: nowrap; }
/* 選手選択グリッド */
.rec-player-select-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(78px, 1fr));
  gap: 8px; margin-bottom: 14px; max-height: 38vh; overflow-y: auto;
}
.rec-player-select-btn {
  background: var(--bg); border: 2px solid var(--border); border-radius: var(--radius);
  padding: 10px 4px; cursor: pointer; text-align: center;
  display: flex; flex-direction: column; gap: 2px; align-items: center; transition: all .1s;
}
.rec-player-select-btn:active { transform: scale(.95); border-color: var(--blue); }
.rec-psel-num  { font-family: 'Poppins', sans-serif; font-size: 20px; font-weight: 700; line-height: 1.1; }
.rec-psel-name { font-size: 11px; color: var(--text-mid); }
</style>

// =====================================================

function showView(name) {
  document.getElementById('view-tournaments').style.display = name === 'tournaments' ? 'block' : 'none';
  document.getElementById('view-detail').style.display      = name === 'detail'      ? 'block' : 'none';
  document.getElementById('view-editor').style.display      = name === 'editor'      ? 'block' : 'none';

}

function parsePlayers(text) {
  return (text || '').trim().split('\n').filter(l => l.trim()).map(l => {
    const parts = l.trim().split(/\s+/);
    return { num: parts[0] || '', name: parts.slice(1).join(' ') };
  }).filter(p => p.num);
}
function playersToText(arr) {
  return (arr || []).map(p => `${p.num} ${p.name}`).join('\n');
}

// =====================================================
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const qClass = q => q===1||q===3 ? 'q1' : q===2||q===4 ? 'q2' : 'qot';

function withTimeout(promise, ms = 10000) {
  return Promise.race([
    promise,
    new Promise((_, r) => setTimeout(() => r(new Error(`タイムアウト（${ms/1000}秒）`)), ms))
  ]);
}

async function loadTournaments() {
  const cont = document.getElementById('tournament-list-container');
  cont.innerHTML = '<div class="loading-msg">読み込み中...</div>';
  try {
    const snap = await withTimeout(
      db.collection('tournaments').orderBy('startDate', 'desc').get()
    );
    if (snap.empty) {
      cont.innerHTML = `<div class="empty-state">大会が登録されていません<br>「大会を登録」から追加してください</div>`;
      return;
    }
    // 各大会の試合数を取得
    const cards = await Promise.all(snap.docs.map(async doc => {
      const d = doc.data();
      const gSnap = await db.collection('games')
        .where('tournamentId', '==', doc.id).get();
      const gameCount = gSnap.size;
      const teams = new Set();
      gSnap.docs.forEach(g => {
        if (g.data().teamAName) teams.add(g.data().teamAName);
        if (g.data().teamBName) teams.add(g.data().teamBName);
      });
      const period = [d.startDate, d.endDate].filter(Boolean).join(' 〜 ') || '日程未定';
      return `
        <div class="tournament-card" onclick="openTournament('${doc.id}')">
          <div class="tc-info">
            <div class="tc-name">${esc(d.name)}</div>
            <div class="tc-meta">${esc(period)}${d.venue ? '　' + esc(d.venue) : ''}</div>
            <div class="tc-badges">
              <span class="tc-badge">試合数: ${gameCount}</span>
              <span class="tc-badge">チーム数: ${teams.size}</span>
              ${d.note ? `<span class="tc-badge">${esc(d.note.slice(0,20))}</span>` : ''}
            </div>
          </div>
          <div class="tc-actions" onclick="event.stopPropagation()">
            <button class="btn-card btn-open" onclick="openTournament('${doc.id}')">開く</button>
            <button class="btn-card btn-edit" onclick="openTournamentModal('${doc.id}')">編集</button>
            <button class="btn-card btn-delete" onclick="deleteTournament('${doc.id}')">削除</button>
          </div>
        </div>`;
    }));
    cont.innerHTML = cards.join('');
  } catch(e) {
    console.error(e);
    cont.innerHTML = `<div class="loading-msg" style="color:red">読み込みエラー: ${e.message}</div>`;
  }
}

async function loadGames() {

  try {
    // orderBy + where の複合インデックスを避けるため JS でソート
    const snap = await withTimeout(
      db.collection('games')
        .where('tournamentId', '==', currentTournamentId)
        .get()

      cont.innerHTML = `<div class="empty-state">この大会の試合がありません<br>「試合を追加」から入力してください</div>`;

    const sortedDocs = snap.docs.slice().sort((a, b) => {
      const da = a.data(), db2 = b.data();
      const dateA = da.gameDate || '', dateB = db2.gameDate || '';

      return (parseInt(da.gameNo) || 0) - (parseInt(db2.gameNo) || 0);

    cont.innerHTML = sortedDocs.map(doc => {
      const d = doc.data();
      const teamA = d.teamAName || 'チームA';
      const teamB = d.teamBName || 'チームB';
      const score = (d.totalA != null) ? `${d.totalA} - ${d.totalB}` : '- - -';
      const label = [d.gameDate, d.gameNo ? `Game ${d.gameNo}` : ''].filter(Boolean).join('　');

  }
}

let statsData = null;
let statsFilters = {
  showRanking: true,
  showTeams:   true,
  showGames:   true,
  rankMetric:  'pts'   // 'pts'=総得点順, 'avg'=平均得点順
};

function toggleStatsSection(key) {

  renderStatsContent();
}

function setRankMetric(metric) {
  statsFilters.rankMetric = metric;

}

// =====================================================
// データ取得（1回だけ fetch → statsData にキャッシュ）
// =====================================================
async function loadStats() {
  const cont = document.getElementById('stats-container');
  statsData = null;
  cont.innerHTML = '<div class="loading-msg">集計中...</div>';
  try {
    const snap = await withTimeout(
      db.collection('games')
        .where('tournamentId', '==', currentTournamentId)
        .get()
    );
    if (snap.empty) {
      cont.innerHTML = '<div class="dash-no-data">試合データがありません。</div>';
      return;
    }

    const playerMap = {};
    const teamMap   = {};
    const gameList  = [];

    for (const doc of snap.docs) {
      const d = doc.data();
      if (!d.pbpData) continue;
      const plays = parsePBP(d.pbpData);
      const st    = buildState(plays);
      const totalA = st.qScore.A.reduce((a,b)=>a+b,0);
      const totalB = st.qScore.B.reduce((a,b)=>a+b,0);
      const teamA  = d.teamAName || 'チームA';
      const teamB  = d.teamBName || 'チームB';

      gameList.push({ id: doc.id, teamA, teamB, totalA, totalB, gameDate: d.gameDate || '', gameNo: d.gameNo || '' });

      for (const [tName, pf, pa] of [[teamA, totalA, totalB],[teamB, totalB, totalA]]) {
        if (!teamMap[tName]) teamMap[tName] = {name:tName,wins:0,losses:0,draws:0,pf:0,pa:0,games:0};
        teamMap[tName].games++;
        teamMap[tName].pf += pf; teamMap[tName].pa += pa;
        if (pf > pa) teamMap[tName].wins++;
        else if (pf < pa) teamMap[tName].losses++;
        else teamMap[tName].draws++;
      }

      for (const team of ['A','B']) {
        const tName = team === 'A' ? teamA : teamB;
        const cells = team === 'A' ? st.cellsA : st.cellsB;
        const playerPts = {};
        for (const cell of Object.values(cells)) {
          if (cell.idx !== 0) continue;
          const pts = cell.scoreType === '3P' ? 3 : cell.scoreType === '2P' ? 2 : 1;
          playerPts[cell.playerNum] = (playerPts[cell.playerNum] || 0) + pts;
        }
        for (const p of Object.values(st.players[team])) {
          const key = `${tName}|${p.num}`;
          if (!playerMap[key]) playerMap[key] = { name: p.name || `#${p.num}`, num: p.num, team: tName, pts: 0, games: 0, fouls: 0 };
          playerMap[key].pts   += (playerPts[p.num] || 0);
          playerMap[key].fouls += (st.fouls[team][p.num] || 0);
          playerMap[key].games++;
          if (!playerMap[key].name && p.name) playerMap[key].name = p.name;
        }
      }
    }

    statsData = { playerMap, teamMap, gameList, totalGames: snap.size };
    renderStatsContent();
  } catch(e) {
    console.error(e);
    cont.innerHTML = `<div class="dash-no-data" style="color:red">集計エラー: ${e.message}</div>`;
  }
}

// =====================================================

function renderStatsContent() {
  if (!statsData) return;
  const { playerMap, teamMap, gameList, totalGames } = statsData;
  const { showRanking, showTeams, showGames, rankMetric } = statsFilters;
  const cont = document.getElementById('stats-container');

  // ランキングソート＋同点同順位
  const getVal = p => rankMetric === 'avg'
    ? (p.games > 0 ? p.pts / p.games : 0)
    : p.pts;

  const allSorted = Object.values(playerMap).sort((a, b) => getVal(b) - getVal(a));

  // 同点なら同じ順位、次は人数分スキップ（例：3位が3人→次は6位）
  let curRank = 1;
  for (let i = 0; i < allSorted.length; i++) {
    if (i > 0 && getVal(allSorted[i]) < getVal(allSorted[i - 1])) {
      curRank = i + 1;
    }
    allSorted[i].rank = curRank;
  }

  const scorers = allSorted.slice(0, 15);

  const teams  = Object.values(teamMap).sort((a,b) => b.wins - a.wins || (b.pf-b.pa) - (a.pf-a.pa));
  const recent = [...gameList].sort((a,b) => (a.gameDate > b.gameDate ? 1 : -1));
  const rankLabel = rankMetric === 'avg' ? '平均得点' : '総得点';
  const highlightCol = rankMetric === 'avg' ? 5 : 4; // 強調列インデックス(0始まり)

  cont.innerHTML = `
    <div class="stats-filter-bar">
      <span class="filter-label">表示：</span>
      <button class="toggle-chip ${showRanking?'active':''}" onclick="toggleStatsSection('showRanking')">得点ランキング</button>
      <button class="toggle-chip ${showTeams?'active':''}"   onclick="toggleStatsSection('showTeams')">チーム成績</button>
      <button class="toggle-chip ${showGames?'active':''}"   onclick="toggleStatsSection('showGames')">試合結果</button>
      ${showRanking ? `
      <div class="filter-divider"></div>
      <span class="filter-label">ランキング基準：</span>
      <div class="rank-switch">
        <button class="rank-switch-btn ${rankMetric==='pts'?'active':''}" onclick="setRankMetric('pts')">総得点</button>
        <button class="rank-switch-btn ${rankMetric==='avg'?'active':''}" onclick="setRankMetric('avg')">平均得点</button>
      </div>` : ''}
    </div>

    <div class="dash-summary">
      <div class="dash-kpi"><div class="dash-kpi-val">${totalGames}</div><div class="dash-kpi-label">試合数</div></div>
      <div class="dash-kpi"><div class="dash-kpi-val">${Object.keys(teamMap).length}</div><div class="dash-kpi-label">チーム数</div></div>
      <div class="dash-kpi"><div class="dash-kpi-val">${Object.keys(playerMap).length}</div><div class="dash-kpi-label">選手数</div></div>
    </div>

    ${showRanking ? `
    <div class="dash-section">
      <div class="dash-section-title">得点ランキング（${rankLabel}順）</div>
      <div class="dash-table-wrap">
        ${scorers.length === 0 ? '<div class="dash-no-data">データなし</div>' : `
        <table class="dash-table"><thead><tr>
          <th class="num" style="width:42px">順位</th>
          <th>選手名</th><th>チーム</th>
          <th class="num">試合</th>
          <th class="num" style="${rankMetric==='pts'?'color:var(--blue);font-weight:800':''}">総得点</th>
          <th class="num" style="${rankMetric==='avg'?'color:var(--blue);font-weight:800':''}">平均</th>
          <th class="num">反則</th>
        </tr></thead><tbody>
          ${scorers.map((p) => {
            const avg = p.games > 0 ? (p.pts/p.games).toFixed(1) : '0.0';
            return `<tr>
              <td class="num"><span class="rank-badge rank-${p.rank}">${p.rank}</span></td>
              <td><strong>#${esc(p.num)}</strong> ${esc(p.name)}</td>
              <td><span class="team-badge">${esc(p.team)}</span></td>
              <td class="num">${p.games}</td>
              <td class="num" style="${rankMetric==='pts'?'font-weight:700;color:var(--blue)':''}"><strong>${p.pts}</strong></td>
              <td class="num" style="${rankMetric==='avg'?'font-weight:700;color:var(--blue)':''}">${avg}</td>
              <td class="num">${p.fouls}</td>
            </tr>`;
          }).join('')}
        </tbody></table>`}
      </div>
    </div>` : ''}

    ${showTeams ? `
    <div class="dash-section">
      <div class="dash-section-title">チーム成績</div>
      <div class="dash-table-wrap">
        ${teams.length === 0 ? '<div class="dash-no-data">データなし</div>' : `
        <table class="dash-table"><thead><tr>
          <th>チーム名</th>
          <th class="num">試合</th><th class="num">勝</th><th class="num">負</th><th class="num">分</th>
          <th class="num">得点</th><th class="num">失点</th><th class="num">±</th>
          <th style="min-width:100px">勝率</th>
        </tr></thead><tbody>
          ${teams.map(t => {
            const rate = t.games > 0 ? Math.round(t.wins/t.games*100) : 0;
            const diff = t.pf - t.pa;
            return `<tr>
              <td><strong>${esc(t.name)}</strong></td>
              <td class="num">${t.games}</td>

          <th>チームA</th><th class="num">スコア</th><th>チームB</th><th class="num">結果</th>
        </tr></thead><tbody>
          ${recent.map(g => {
            const winA = g.totalA > g.totalB, winB = g.totalB > g.totalA;
            return `<tr>
              <td>${esc(g.gameDate)||'—'}</td>
              <td class="num">${esc(g.gameNo)||'—'}</td>
              <td class="${winA?'result-win':''}">${esc(g.teamA)}</td>
              <td class="num"><strong>${g.totalA} - ${g.totalB}</strong></td>
              <td class="${winB?'result-win':''}">${esc(g.teamB)}</td>
              <td class="num">${winA?'<span class="result-win">A勝</span>':winB?'<span class="result-win">B勝</span>':'<span class="result-draw">分</span>'}</td>

        </tbody></table>
      </div>
    </div>` : ''}
  `;
}

async function openTournamentModal(id = null) {

  document.getElementById('m-name').value = '';
  document.getElementById('m-startDate').value = '';
  document.getElementById('m-endDate').value = '';
  document.getElementById('m-venue').value = '';
  document.getElementById('m-note').value = '';
  if (id) {
    try {
      const doc = await withTimeout(db.collection('tournaments').doc(id).get());
      const d = doc.data();
      document.getElementById('m-name').value      = d.name      || '';
      document.getElementById('m-startDate').value = d.startDate || '';
      document.getElementById('m-endDate').value   = d.endDate   || '';
      document.getElementById('m-venue').value     = d.venue     || '';
      document.getElementById('m-note').value      = d.note      || '';
    } catch(e) { /* ignore */ }
  }
  document.getElementById('modal-tournament').classList.add('open');
}

function closeTournamentModal() {
  document.getElementById('modal-tournament').classList.remove('open');
  editingTournamentId = null;
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-tournament')) closeTournamentModal();
}

async function saveTournament() {
  const name = document.getElementById('m-name').value.trim();
  if (!name) { alert('大会名を入力してください'); return; }
  const data = {
    name,
    startDate: document.getElementById('m-startDate').value,
    endDate:   document.getElementById('m-endDate').value,
    venue:     document.getElementById('m-venue').value.trim(),
    note:      document.getElementById('m-note').value.trim(),
    updatedAt: new Date().toISOString()
  };
  try {
    if (editingTournamentId) {
      await withTimeout(db.collection('tournaments').doc(editingTournamentId).update(data));
      showToast('大会を更新しました');
      // 詳細画面が開いていれば表示を更新
      if (currentTournamentId === editingTournamentId) {
        document.getElementById('detail-title').textContent = name;
      }
    } else {
      data.createdAt = new Date().toISOString();
      await withTimeout(db.collection('tournaments').add(data));
      showToast('大会を登録しました');
    }
    closeTournamentModal();
    // 大会一覧画面にいれば再読み込み
    if (document.getElementById('view-tournaments').style.display !== 'none') {
      loadTournaments();
    }
  } catch(e) {
    console.error(e);
    showToast('エラー: ' + e.message);
  }
}

async function deleteTournament(id) {
  if (!confirm('この大会を削除しますか？\n※ 試合データは削除されません')) return;
  try {
    await withTimeout(db.collection('tournaments').doc(id).delete());
    showToast('大会を削除しました');
    loadTournaments();
  } catch(e) {
    showToast('エラー: ' + e.message);
  }
}

async function saveGame() {
  const btn = document.getElementById('btn-save');
  btn.disabled = true; btn.textContent = '保存中...';
  try {
    const now = new Date().toISOString();
    const data = {
      tournamentId: currentTournamentId,
      teamAName:  document.getElementById('teamAName').value,
      teamBName:  document.getElementById('teamBName').value,
      gameNo:     document.getElementById('gameNo').value,
      gameDate:   document.getElementById('gameDate').value,
      venue:      document.getElementById('venue').value,
      pbpData:    document.getElementById('pbpInput').value,
      playersA:   parsePlayers(document.getElementById('playersA').value),
      playersB:   parsePlayers(document.getElementById('playersB').value),
      totalA:     lastTotalA,
      totalB:     lastTotalB,
      updatedAt:  now
    };
    if (currentGameId) {
      await withTimeout(db.collection('games').doc(currentGameId).update(data));
    } else {
      data.createdAt = now;
      const ref = await withTimeout(db.collection('games').add(data));
      currentGameId = ref.id;
    }
    showToast('保存しました');
  } catch(e) {
    console.error(e);
    showToast('保存エラー: ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = '保存';
  }
}

async function deleteGame(id) {

// =====================================================
// パーサー
// =====================================================
function extractPlayer(ev) {
  const m = ev.match(/#(\d+)([^#]*?)(?=2P|3P|フリースロー|Pファイル|Pファウル|Tファイル|Tファウル|タイムアウト|$)/);
  if (!m) return { num: null, name: '' };
  return { num: m[1], name: m[2].trim() };
}

function parseEvent(ev) {
  if (!ev || !ev.trim()) return null;
  const { num: playerNum, name: playerName } = extractPlayer(ev);
  let type = null, points = 0;
  if      (ev.includes('3P成功'))                                { type = '3P'; points = 3; }
  else if (ev.includes('2P成功'))                                { type = '2P'; points = 2; }
  else if (ev.includes('フリースロー成功'))                      { type = 'FT'; points = 1; }
  else if (ev.includes('Pファイル') || ev.includes('Pファウル')) { type = 'PF'; }
  else if (ev.includes('Tファイル') || ev.includes('Tファウル')) { type = 'TF'; }
  else if (ev.includes('タイムアウト'))                          { type = 'TO'; }
  return { playerNum, playerName, type, points };
}

function parsePBP(text) {
  return text.trim().split('\n').filter(l => l.trim()).map(l => {
    const p = l.split('\t');
    const q = parseInt(p[0]);
    if (isNaN(q)) return null;
    return { quarter: q, timer: (p[1]||'').trim(), evA: (p[2]||'').trim(), evB: (p[4]||'').trim() };
  }).filter(Boolean);
}

// =====================================================
// 状態構築
// =====================================================
function buildState(plays) {
  const st = {
    scoreA: 0, scoreB: 0,
    cellsA: {}, cellsB: {},
    players:   { A: {}, B: {} },
    fouls:     { A: {}, B: {} },
    teamFouls: { A: [0,0,0,0,0], B: [0,0,0,0,0] },
    timeouts:  { A: [[],[],[],[],[]], B: [[],[],[],[],[]] },
    qScore:    { A: [0,0,0,0,0], B: [0,0,0,0,0] }
  };
  function proc(team, evStr, q, timer) {
    const ev = parseEvent(evStr);
    if (!ev) return;
    const qi = Math.min(q,4) - 1;
    if (ev.playerNum && !st.players[team][ev.playerNum])
      st.players[team][ev.playerNum] = { num: ev.playerNum, name: ev.playerName || '' };
    if (ev.points > 0) {
      const cells = team === 'A' ? st.cellsA : st.cellsB;
      for (let i = 0; i < ev.points; i++) {
        if (team === 'A') st.scoreA++; else st.scoreB++;
        const score = team === 'A' ? st.scoreA : st.scoreB;
        cells[score] = { playerNum: ev.playerNum, scoreType: ev.type, quarter: q, idx: i };
      }
      st.qScore[team][qi] += ev.points;
    }
    if (ev.type === 'PF' || ev.type === 'TF') {
      if (ev.playerNum) st.fouls[team][ev.playerNum] = (st.fouls[team][ev.playerNum] || 0) + 1;
      st.teamFouls[team][qi]++;
    }
    if (ev.type === 'TO') st.timeouts[team][qi].push(timer || '');
  }
  for (const p of plays) {
    if (p.evA) proc('A', p.evA, p.quarter, p.timer);
    if (p.evB) proc('B', p.evB, p.quarter, p.timer);
  }
  return st;
}

// =====================================================
// スコアシート生成
// =====================================================
function scoreCell(cells, score, side) {
  const c = cells[score];
  if (!c) return `<td class="${side}-blank"></td>`;
  const isFT = c.scoreType === 'FT';
  const mark = isFT
    ? (c.idx === 0 ? `${esc(c.playerNum)}●` : '●')
    : (c.idx === 0 ? `${esc(c.playerNum)}/` : '/');
  return `<td class="${side}-blank ${isFT?'ft-mark':'fg-mark'} ${qClass(c.quarter)}"><span>${mark}</span></td>`;
}

function buildRunningScore(st) {
  let rows = '';
  for (let r = 1; r <= 40; r++) {
    const style = r % 10 === 0 ? ' style="border-bottom:1.5px solid rgba(100,80,60,0.6)"' : '';
    rows += `<tr${style}>`;
    for (let g = 0; g < 4; g++) {
      const n = r + g * 40;
      rows += scoreCell(st.cellsA, n, 'a');
      rows += `<td class="col-num">${n}</td><td class="col-num">${n}</td>`;
      rows += scoreCell(st.cellsB, n, 'b');
    }
    rows += '</tr>';
  }
  return rows;
}

  const list = Object.values(st.players[team]).sort((a,b)=>parseInt(a.num)-parseInt(b.num));

}

// =====================================================
// 得点推移グラフ
// =====================================================
function buildScoreTimeline(plays) {
  // 各プレイ後の累積スコアと、クォーター終端インデックスを返す
  const points = [{ scoreA: 0, scoreB: 0, q: 0 }]; // 開始点
  const qMarkers = []; // { idx, q } クォーター終端
  let scoreA = 0, scoreB = 0, prevQ = 0;

  plays.forEach((play, i) => {
    if (!play) return;
    const { quarter, evA, evB } = play;

    // クォーター変わり目 → 直前クォーターの末端マーカー
    if (quarter !== prevQ && prevQ > 0) {
      qMarkers.push({ idx: points.length - 1, q: prevQ });
    }

    const pA = parseEvent(evA);
    const pB = parseEvent(evB);
    if (pA && pA.points) scoreA += pA.points;
    if (pB && pB.points) scoreB += pB.points;

    points.push({ scoreA, scoreB, q: quarter });
    prevQ = quarter;
  });

  // 最終クォーター末端
  if (prevQ > 0) {
    qMarkers.push({ idx: points.length - 1, q: prevQ });
  }

  return { points, qMarkers };
}

function buildScoreGraphSVG(plays, teamAName, teamBName) {
  const { points, qMarkers } = buildScoreTimeline(plays);
  if (points.length < 2) return '';

  const W = 680, H = 200;
  const padL = 36, padR = 14, padT = 14, padB = 32;
  const gW = W - padL - padR;
  const gH = H - padT - padB;

  const maxScore = Math.max(...points.map(p => Math.max(p.scoreA, p.scoreB)), 10);
  const yMax = Math.ceil(maxScore / 10) * 10;

  const n = points.length - 1; // index範囲
  const xOf = i => padL + (i / n) * gW;
  const yOf = s => padT + gH - (s / yMax) * gH;

  // グリッド線 (Y軸 10点刻み)
  let gridLines = '';
  for (let v = 0; v <= yMax; v += 10) {
    const y = yOf(v);
    gridLines += `<line x1="${padL}" y1="${y}" x2="${padL + gW}" y2="${y}" stroke="#E8EEF4" stroke-width="1"/>`;
    gridLines += `<text x="${padL - 4}" y="${y + 4}" text-anchor="end" font-size="9" fill="#9AAABB">${v}</text>`;
  }

  // クォーター区切り線
  let qLines = '';
  qMarkers.slice(0, -1).forEach(({ idx, q }) => {
    const x = xOf(idx);
    qLines += `<line x1="${x}" y1="${padT}" x2="${x}" y2="${padT + gH}" stroke="#9AAABB" stroke-width="1" stroke-dasharray="4,3"/>`;
    qLines += `<text x="${x + 4}" y="${padT + 10}" font-size="8" fill="#9AAABB">${q}Q</text>`;
  });

  // 折れ線パス生成
  const pathA = points.map((p, i) => `${i === 0 ? 'M' : 'L'}${xOf(i)},${yOf(p.scoreA)}`).join(' ');
  const pathB = points.map((p, i) => `${i === 0 ? 'M' : 'L'}${xOf(i)},${yOf(p.scoreB)}`).join(' ');

  // 逆転ポイント検出（直前と比べてリードチームが変わった点）
  let overtakeDots = '';
  for (let i = 1; i < points.length; i++) {
    const prev = points[i - 1];
    const cur  = points[i];
    const prevLead = prev.scoreA > prev.scoreB ? 'A' : prev.scoreB > prev.scoreA ? 'B' : '=';
    const curLead  = cur.scoreA  > cur.scoreB  ? 'A' : cur.scoreB  > cur.scoreA  ? 'B' : '=';
    if (prevLead !== '=' && curLead !== '=' && prevLead !== curLead) {
      const x = xOf(i);
      // 交差点の近くに丸を置く (両チームの中間)
      const yMid = (yOf(cur.scoreA) + yOf(cur.scoreB)) / 2;
      overtakeDots += `<circle cx="${x}" cy="${yMid}" r="5" fill="#FF6F00" opacity="0.85"/>`;
    }
  }

  // クォーター終端の点（両チーム）
  let qDots = '';
  qMarkers.forEach(({ idx }) => {
    const p = points[idx];
    qDots += `<circle cx="${xOf(idx)}" cy="${yOf(p.scoreA)}" r="3.5" fill="#005BAC"/>`;
    qDots += `<circle cx="${xOf(idx)}" cy="${yOf(p.scoreB)}" r="3.5" fill="#E53935"/>`;
  });

  // X軸ラベル (クォーター名)
  let xLabels = '';
  qMarkers.forEach(({ idx, q }) => {
    xLabels += `<text x="${xOf(idx)}" y="${padT + gH + 16}" text-anchor="middle" font-size="9" fill="#5A6A7A">${q}Q終</text>`;
  });

  // 凡例
  const legY = H - 6;
  const legend = `
    <rect x="${padL}" y="${legY - 7}" width="14" height="3" rx="1.5" fill="#005BAC"/>
    <text x="${padL + 17}" y="${legY}" font-size="9" fill="#005BAC" font-weight="700">${esc(teamAName)}</text>
    <rect x="${padL + 90}" y="${legY - 7}" width="14" height="3" rx="1.5" fill="#E53935"/>
    <text x="${padL + 107}" y="${legY}" font-size="9" fill="#E53935" font-weight="700">${esc(teamBName)}</text>
    <circle cx="${padL + 190}" cy="${legY - 4}" r="5" fill="#FF6F00" opacity="0.85"/>
    <text x="${padL + 198}" y="${legY}" font-size="9" fill="#FF6F00">逆転</text>
  `;

  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block;overflow:visible" xmlns="http://www.w3.org/2000/svg">
  ${gridLines}
  ${qLines}
  <path d="${pathA}" fill="none" stroke="#005BAC" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>
  <path d="${pathB}" fill="none" stroke="#E53935" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>
  ${qDots}
  ${overtakeDots}
  ${xLabels}
  ${legend}
</svg>`;
}

  ).join('') + unknownBtn;
  document.getElementById('rec-player-overlay').classList.add('show');
}

function closePlayerSelect() {
  document.getElementById('rec-player-overlay').classList.remove('show');
}

async function recordEvent(evType, team, player) {
  closePlayerSelect();
  const timer = getRecTimerStr();
  const evStr = player ? `#${player.num}${player.name}${evType}` : evType;
  const line  = team === 'A'
    ? `${recCurrentQ}\t${timer}\t${evStr}\t\t`
    : `${recCurrentQ}\t${timer}\t\t\t${evStr}`;

  recPbpData = recPbpData ? recPbpData + '\n' + line : line;
  updateRecScore();
  updatePBPFeed();

  setRecStatus('保存中...');
  try {
    const plays  = parsePBP(recPbpData);
    const st     = buildState(plays);
    const totalA = st.qScore.A.reduce((a, b) => a + b, 0);
    const totalB = st.qScore.B.reduce((a, b) => a + b, 0);
    await db.collection('games').doc(recGameId).update({
      pbpData: recPbpData, totalA, totalB,
      updatedAt: new Date().toISOString()
    });
    setRecStatus('✓');
    setTimeout(() => setRecStatus(''), 1200);
  } catch(e) {
    setRecStatus('⚠ 保存失敗');
    recPbpData = recPbpData.split('\n').slice(0, -1).join('\n');
    updateRecScore();
  }
}

async function undoLastEvent() {
  const lines = recPbpData.trim().split('\n').filter(Boolean);
  if (lines.length === 0) return;
  if (!confirm('最後のイベントを取り消しますか？')) return;
  lines.pop();
  recPbpData = lines.join('\n');
  updateRecScore();
  updatePBPFeed();
  try {
    const plays  = parsePBP(recPbpData);
    const st     = buildState(plays);
    const totalA = st.qScore.A.reduce((a, b) => a + b, 0);
    const totalB = st.qScore.B.reduce((a, b) => a + b, 0);
    await db.collection('games').doc(recGameId).update({
      pbpData: recPbpData, totalA, totalB,
      updatedAt: new Date().toISOString()
    });
    showToast('取り消しました');
  } catch(e) { showToast('エラー: ' + e.message); }
}

function updateRecScore() {
  const st = buildState(parsePBP(recPbpData));
  document.getElementById('rec-score-a').textContent = st.qScore.A.reduce((a, b) => a + b, 0);
  document.getElementById('rec-score-b').textContent = st.qScore.B.reduce((a, b) => a + b, 0);
}

function setRecStatus(msg) {
  document.getElementById('rec-status').textContent = msg;
}

async function endGame() {
  if (!confirm('試合を終了しますか？')) return;
  try {
    const st     = buildState(parsePBP(recPbpData));
    const totalA = st.qScore.A.reduce((a, b) => a + b, 0);
    const totalB = st.qScore.B.reduce((a, b) => a + b, 0);
    await db.collection('games').doc(recGameId).update({
      pbpData: recPbpData, totalA, totalB,
      status: 'finished', updatedAt: new Date().toISOString()
    });
    showToast('試合終了しました');
    backFromRecorder();
  } catch(e) { showToast('エラー: ' + e.message); }
}

const REC_EVENT_TYPES = ['フリースロー成功','2P成功','3P成功','Pファウル','タイムアウト'];

function parseEventStr(evStr) {
  for (const ev of REC_EVENT_TYPES) {
    if (evStr === ev) return { evType: ev, playerStr: '' };
    if (evStr.endsWith(ev)) return { evType: ev, playerStr: evStr.slice(0, -ev.length) };
  }
  return { evType: evStr, playerStr: '' };
}

function parsePBPLine(line) {
  const parts = line.split('\t');
  const q     = parseInt(parts[0]) || 1;
  const timer = parts[1] || '';
  const evA   = parts[2] || '';
  const evB   = parts[4] || '';
  const team  = evA ? 'A' : 'B';
  const evStr = evA || evB;
  const { evType, playerStr } = parseEventStr(evStr);
  return { q, timer, team, evStr, evType, playerStr };
}

function updatePBPFeed() {
  const feed = document.getElementById('rec-pbp-feed');
  if (!feed) return;
  const lines = recPbpData.trim().split('\n').filter(Boolean);
  if (lines.length === 0) {
    feed.innerHTML = '<div class="rec-pbp-empty">記録はまだ<br>ありません</div>';
    return;
  }
  feed.innerHTML = lines.slice().reverse().map((line, revIdx) => {
    const idx = lines.length - 1 - revIdx;
    const { q, timer, team, evStr } = parsePBPLine(line);
    const qLabel = q <= 4 ? `${q}Q` : 'OT';
    const cls    = team === 'A' ? 'pbp-a' : 'pbp-b';
    return `<div class="rec-pbp-entry ${cls}" onclick="clickPBPEntry(${idx})">
      <div class="rec-pbp-time">${qLabel} ${esc(timer)}</div>
      <div class="rec-pbp-text ${cls}">${esc(evStr)}</div>
    </div>`;
  }).join('');
  feed.scrollTop = 0;
}

  const teamName = team === 'A' ? recTeamAName : recTeamBName;

  const cls      = team === 'A' ? 'pbp-a' : 'pbp-b';

  infoEl.textContent = `[${qLabel} ${timer}]  ${teamName}：${evStr}`;
  infoEl.className   = `rec-pbpedit-info ${cls}`;

  const all       = team === 'A' ? recPlayersA : recPlayersB;
  const sectionEl = document.getElementById('rec-pbpedit-player-section');

      onclick="updatePBPEntryPlayer(${idx},null)">

    </button>`;
    gridEl.innerHTML = all.map(p => {
      const isCur = playerStr.includes('#' + p.num);
      return `<button class="rec-player-select-btn" style="${isCur ? `border-color:${color};background:var(--blue-dim)` : ''}"
        onclick="updatePBPEntryPlayer(${idx},{num:'${p.num.replace(/'/g,"\\'")}',name:'${p.name.replace(/'/g,"\\'")}'})"
      >
        <span class="rec-psel-num" style="color:${color}">#${esc(p.num)}</span>
        <span class="rec-psel-name">${esc(p.name)}</span>
      </button>`;
    }).join('') + unknownBtn;
  }

  document.getElementById('rec-pbpedit-delete-btn').onclick = () => deletePBPEntry(idx);
  document.getElementById('rec-pbpedit-overlay').classList.add('show');
}

function closePBPEdit() {
  document.getElementById('rec-pbpedit-overlay').classList.remove('show');
}

async function updatePBPEntryPlayer(idx, player) {
  closePBPEdit();
  const lines = recPbpData.trim().split('\n').filter(Boolean);
  if (idx < 0 || idx >= lines.length) return;
  const { q, timer, team, evType } = parsePBPLine(lines[idx]);
  const evStr = player ? `#${player.num}${player.name}${evType}` : evType;
  lines[idx]  = team === 'A'
    ? `${q}\t${timer}\t${evStr}\t\t`
    : `${q}\t${timer}\t\t\t${evStr}`;
  recPbpData = lines.join('\n');
  updateRecScore();
  updatePBPFeed();
  try {
    const st = buildState(parsePBP(recPbpData));
    const totalA = st.qScore.A.reduce((a,b)=>a+b,0);
    const totalB = st.qScore.B.reduce((a,b)=>a+b,0);
    await db.collection('games').doc(recGameId).update({
      pbpData: recPbpData, totalA, totalB, updatedAt: new Date().toISOString()
    });
    showToast('選手を更新しました');
  } catch(e) { showToast('エラー: ' + e.message); }
}

async function deletePBPEntry(idx) {
  if (!confirm('この記録を削除しますか？')) return;
  closePBPEdit();
  const lines = recPbpData.trim().split('\n').filter(Boolean);
  lines.splice(idx, 1);
  recPbpData = lines.join('\n');
  updateRecScore();
  updatePBPFeed();
  try {
    const st = buildState(parsePBP(recPbpData));
    const totalA = st.qScore.A.reduce((a,b)=>a+b,0);
    const totalB = st.qScore.B.reduce((a,b)=>a+b,0);
    await db.collection('games').doc(recGameId).update({
      pbpData: recPbpData, totalA, totalB, updatedAt: new Date().toISOString()
