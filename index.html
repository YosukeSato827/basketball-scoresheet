<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バスケットボール スコアシート v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Poppins:wght@700;900&family=Klee+One:wght@400;600&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<style>
/* =====================================================
   Molten Brand Variables
   ===================================================== */
:root {
  --blue:       #005BAC;   /* Molten primary blue (Pantone 285C) */
  --blue-dark:  #004A8E;   /* hover/active */
  --blue-dim:   #E0EEF9;   /* light tint */
  --white:      #FFFFFF;
  --bg:         #F3F6FA;   /* page background */
  --text:       #1A1A2E;   /* main text */
  --text-mid:   #5A6A7A;   /* secondary text */
  --text-light: #9AAABB;   /* meta/hint */
  --border:     #DDE5EE;   /* subtle border */
  --shadow-sm:  0 1px 6px rgba(16,104,179,.08);
  --shadow-md:  0 4px 20px rgba(16,104,179,.13);
  --radius:     10px;
  --radius-sm:  6px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans JP','Meiryo','Yu Gothic',sans-serif;
  background: var(--bg); color: var(--text); font-size: 13px;
  -webkit-font-smoothing: antialiased;
}

/* =====================================================
   画面切り替え
   ===================================================== */
#view-tournaments { display: block; }
#view-detail      { display: none; }
#view-editor      { display: none; }

/* =====================================================
   共通ヘッダー
   ===================================================== */
.app-header {
  background: var(--blue); color: white;
  padding: 0 28px; height: 56px;
  display: flex; align-items: center; gap: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,.18);
}
.app-header h1 { display: none; } /* ロゴブロックで代替 */

/* Molten logo + ScoreLink */
.logo-block {
  display: flex; flex-direction: column; line-height: 1.1;
  flex: 1; gap: 2px;
}
.logo-wordmark {
  font-family: 'Poppins', sans-serif;
  font-weight: 600; font-size: 22px;
  color: white; letter-spacing: .02em;
  line-height: 1;
}
.logo-product {
  font-family: 'Poppins', sans-serif;
  font-size: 10px; font-weight: 500;
  color: rgba(255,255,255,.65);
  letter-spacing: .12em;
}
.logo-divider {
  width: 1px; height: 32px; background: rgba(255,255,255,.25);
  flex-shrink: 0; margin: 0 4px;
}
.btn-hdr {
  background: rgba(255,255,255,.14); color: white;
  border: 1px solid rgba(255,255,255,.35); border-radius: var(--radius-sm);
  padding: 6px 16px; font-size: 12px; font-weight: 700; cursor: pointer;
  white-space: nowrap; transition: background .15s;
}
.btn-hdr:hover { background: rgba(255,255,255,.26); }
.btn-hdr-primary {
  background: white; color: var(--blue);
  border: none; border-radius: var(--radius-sm);
  padding: 7px 18px; font-size: 12px; font-weight: 700; cursor: pointer;
  white-space: nowrap; transition: background .15s;
}
.btn-hdr-primary:hover { background: #dceefa; }

/* =====================================================
   大会一覧
   ===================================================== */
.page-body { padding: 28px 24px; max-width: 880px; margin: 0 auto; }

.section-eyebrow {
  font-size: 10px; font-weight: 700; letter-spacing: .12em;
  text-transform: uppercase; color: var(--text-light);
  margin-bottom: 16px;
}

.tournament-card {
  background: white; border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  padding: 20px 24px; margin-bottom: 12px;
  cursor: pointer;
  display: flex; align-items: center; gap: 20px;
  border-left: 3px solid transparent;
  transition: box-shadow .2s, border-color .2s;
}
.tournament-card:hover {
  box-shadow: var(--shadow-md);
  border-left-color: var(--blue);
}
.tc-icon { font-size: 28px; flex-shrink: 0; opacity: .85; }
.tc-info { flex: 1; min-width: 0; }
.tc-name {
  font-size: 17px; font-weight: 700; color: var(--text);
  margin-bottom: 4px;
}
.tc-meta { font-size: 12px; color: var(--text-mid); }
.tc-badges { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.tc-badge {
  display: inline-block; padding: 3px 10px;
  border-radius: 20px; font-size: 11px; font-weight: 700;
  background: var(--blue-dim); color: var(--blue);
}
.tc-actions { display: flex; gap: 8px; flex-shrink: 0; }
.btn-card {
  padding: 6px 14px; border: none; border-radius: var(--radius-sm);
  font-size: 12px; cursor: pointer; font-weight: 700;
  transition: opacity .15s;
}
.btn-card:hover { opacity: .82; }
.btn-open   { background: var(--blue); color: white; }
.btn-edit   { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
.btn-delete { background: white; color: #D32F2F; border: 1px solid #D32F2F; }

.empty-state {
  text-align: center; padding: 80px 20px;
  color: var(--text-light); font-size: 14px;
}
.empty-state span { font-size: 52px; display: block; margin-bottom: 16px; opacity: .6; }
.loading-msg { text-align: center; padding: 40px; color: var(--text-light); }

/* =====================================================
   大会詳細ヘッダー
   ===================================================== */
.detail-header {
  background: var(--blue); color: white;
  padding: 14px 28px 14px;
}
.detail-title {
  font-size: 20px; font-weight: 700;
  display: block; margin-bottom: 10px;
}
.detail-header-top {
  display: flex; align-items: center; gap: 10px;
}
.detail-meta { font-size: 12px; color: rgba(255,255,255,.75); margin-top: 8px; }

/* タブバー */
.tab-bar {
  display: flex; background: white;
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
}
.tab-btn {
  padding: 12px 22px; color: var(--text-mid);
  border: none; background: none; cursor: pointer;
  font-size: 13px; font-weight: 700;
  border-bottom: 3px solid transparent;
  margin-bottom: -1px; transition: color .15s;
}
.tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }
.tab-btn:hover:not(.active) { color: var(--text); }

/* =====================================================
   試合カード
   ===================================================== */
.game-card {
  background: white; border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  padding: 14px 20px; margin-bottom: 10px;
  display: flex; align-items: center; gap: 16px;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: box-shadow .2s, border-color .2s;
}
.game-card:hover { box-shadow: var(--shadow-md); border-left-color: var(--blue); }
.gc-info { flex: 1; min-width: 0; }
.gc-title { font-size: 11px; color: var(--text-light); font-weight: 500; letter-spacing: .06em; }
.gc-teams { font-size: 16px; font-weight: 700; margin-top: 2px; }
.gc-score {
  font-size: 24px; font-weight: 700; color: var(--blue);
  min-width: 90px; text-align: center; font-variant-numeric: tabular-nums;
}
.gc-actions { display: flex; gap: 8px; }

/* =====================================================
   ダッシュボード
   ===================================================== */
.dash-summary {
  display: grid; grid-template-columns: repeat(3,1fr);
  gap: 14px; margin-bottom: 28px;
}
.dash-kpi {
  background: white; border-radius: var(--radius);
  box-shadow: var(--shadow-sm); padding: 20px;
  text-align: center; border-top: 3px solid var(--blue);
}
.dash-kpi-val {
  font-size: 36px; font-weight: 700; color: var(--blue);
  line-height: 1; font-variant-numeric: tabular-nums;
}
.dash-kpi-label { font-size: 11px; color: var(--text-light); margin-top: 6px; font-weight: 500; letter-spacing: .04em; }

.dash-section { margin-bottom: 28px; }
.dash-section-title {
  font-size: 11px; font-weight: 700; color: var(--text-light);
  letter-spacing: .1em; text-transform: uppercase;
  padding-left: 10px; margin-bottom: 10px;
  border-left: 3px solid var(--blue);
}
.dash-table-wrap {
  background: white; border-radius: var(--radius);
  box-shadow: var(--shadow-sm); overflow: hidden;
}
.dash-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.dash-table th {
  background: var(--blue-dim); color: var(--blue);
  font-size: 11px; font-weight: 700; letter-spacing: .04em;
  padding: 9px 12px; text-align: left;
  border-bottom: 1px solid #C5DCF0;
}
.dash-table th.num { text-align: center; }
.dash-table td {
  padding: 10px 12px; border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.dash-table td.num { text-align: center; }
.dash-table tr:last-child td { border-bottom: none; }
.dash-table tr:hover td { background: #F7FBFF; }

.rank-badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 24px; height: 24px; border-radius: 50%;
  font-size: 11px; font-weight: 700;
  background: var(--border); color: var(--text-mid);
}
.rank-1 { background: #FFD700; color: #7A5800; }
.rank-2 { background: #C8CDD2; color: #444; }
.rank-3 { background: #CE8A55; color: #fff; }

.team-badge {
  display: inline-block; padding: 3px 9px;
  border-radius: 20px; font-size: 11px; font-weight: 700;
  background: var(--blue-dim); color: var(--blue);
}
.win-rate-bar { display: flex; align-items: center; gap: 8px; }
.win-rate-track { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.win-rate-fill  { height: 100%; background: var(--blue); border-radius: 3px; }
.result-win  { color: #1B7F3A; font-weight: 700; }
.result-lose { color: #C62828; }
.result-draw { color: var(--text-light); }
.dash-no-data { text-align: center; padding: 36px; color: var(--text-light); font-size: 13px; }

/* =====================================================
   統計フィルターバー
   ===================================================== */
.stats-filter-bar {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  padding: 10px 14px; margin-bottom: 20px;
  background: white; border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
}
.filter-label {
  font-size: 11px; font-weight: 700; color: var(--text-light);
  letter-spacing: .06em; white-space: nowrap;
}
.toggle-chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 13px; border-radius: 20px;
  font-size: 12px; font-weight: 600; font-family: inherit;
  border: 1.5px solid var(--border); background: var(--white);
  color: var(--text-mid); cursor: pointer; transition: all .15s;
}
.toggle-chip.active {
  background: var(--blue); border-color: var(--blue); color: white;
}
.toggle-chip:not(.active):hover { background: var(--bg); }
.filter-divider {
  width: 1px; height: 20px; background: var(--border); flex-shrink: 0;
}
.rank-switch {
  display: inline-flex;
  border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  overflow: hidden;
}
.rank-switch-btn {
  padding: 5px 13px; font-size: 12px; font-weight: 600; font-family: inherit;
  border: none; border-right: 1px solid var(--border);
  background: var(--white); color: var(--text-mid);
  cursor: pointer; transition: all .15s;
}
.rank-switch-btn:last-child { border-right: none; }
.rank-switch-btn.active { background: var(--blue); color: white; }
.rank-switch-btn:not(.active):hover { background: var(--bg); }

/* =====================================================
   モーダル
   ===================================================== */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(10,30,60,.45);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000; display: none; backdrop-filter: blur(2px);
}
.modal-overlay.open { display: flex; }
.modal {
  background: white; border-radius: var(--radius);
  padding: 28px 32px; width: 460px; max-width: 95vw;
  box-shadow: 0 12px 48px rgba(0,0,0,.18);
}
.modal h2 {
  font-size: 17px; font-weight: 700; color: var(--text);
  margin-bottom: 22px;
  padding-bottom: 14px; border-bottom: 1px solid var(--border);
}
.form-group { margin-bottom: 16px; }
.form-group label {
  display: block; font-size: 11px; font-weight: 700;
  margin-bottom: 5px; color: var(--text-mid);
  letter-spacing: .04em; text-transform: uppercase;
}
.form-group input, .form-group textarea {
  width: 100%; padding: 9px 12px;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-size: 13px; font-family: inherit; color: var(--text);
  transition: border-color .15s;
}
.form-group input:focus, .form-group textarea:focus {
  outline: none; border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(16,104,179,.12);
}
.form-group textarea { height: 80px; resize: vertical; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }
.btn-modal-cancel {
  padding: 9px 20px; border: 1px solid var(--border);
  border-radius: var(--radius-sm); background: white;
  cursor: pointer; font-size: 13px; color: var(--text-mid);
  font-weight: 500;
}
.btn-modal-cancel:hover { background: var(--bg); }
.btn-modal-save {
  padding: 9px 24px; border: none;
  border-radius: var(--radius-sm); background: var(--blue);
  color: white; cursor: pointer; font-size: 13px; font-weight: 700;
}
.btn-modal-save:hover { background: var(--blue-dark); }

/* =====================================================
   トースト
   ===================================================== */
#toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  background: #1A1A2E; color: white; padding: 11px 26px;
  border-radius: 8px; font-size: 13px; z-index: 9999;
  opacity: 0; transition: opacity .3s; pointer-events: none;
  box-shadow: 0 4px 20px rgba(0,0,0,.25);
  white-space: nowrap;
}
#toast.show { opacity: 1; }

/* =====================================================
   エディター
   ===================================================== */
.editor-toolbar {
  background: var(--blue); color: white;
  padding: 0 20px; height: 52px;
  display: flex; align-items: center; gap: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,.15);
}
.btn-back {
  background: rgba(255,255,255,.14); color: white;
  border: 1px solid rgba(255,255,255,.35); border-radius: var(--radius-sm);
  padding: 6px 14px; font-size: 12px; cursor: pointer; font-weight: 700;
}
.btn-back:hover { background: rgba(255,255,255,.26); }
.toolbar-title {
  flex: 1; font-size: 14px; font-weight: 700;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.btn-save {
  background: #1E9E4A; color: white; border: none;
  border-radius: var(--radius-sm);
  padding: 7px 18px; font-size: 13px; font-weight: 700; cursor: pointer;
  transition: background .15s;
}
.btn-save:hover { background: #167A38; }
.btn-save:disabled { background: #9AAABB; cursor: default; }
.btn-print-small {
  background: rgba(255,255,255,.14); color: white;
  border: 1px solid rgba(255,255,255,.35); border-radius: var(--radius-sm);
  padding: 6px 14px; font-size: 12px; cursor: pointer; font-weight: 700;
}

.input-section {
  background: white; padding: 20px 24px; margin: 16px 20px;
  border-radius: var(--radius); box-shadow: var(--shadow-sm);
}
.input-grid {
  display: grid; grid-template-columns: repeat(3,1fr);
  gap: 14px; margin-bottom: 14px;
}
.input-grid label {
  display: block; font-size: 10px; font-weight: 700;
  margin-bottom: 5px; color: var(--text-mid);
  letter-spacing: .06em; text-transform: uppercase;
}
.input-grid input {
  width: 100%; padding: 8px 10px;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-size: 13px; font-family: inherit; color: var(--text);
  transition: border-color .15s;
}
.input-grid input:focus {
  outline: none; border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(16,104,179,.1);
}
.pbp-label {
  display: block; font-size: 10px; font-weight: 700;
  margin-bottom: 6px; color: var(--text-mid);
  letter-spacing: .06em; text-transform: uppercase;
}
textarea#pbpInput {
  width: 100%; height: 130px; padding: 10px 12px;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-size: 12px; font-family: 'Consolas',monospace; resize: vertical;
  color: var(--text);
}
textarea#pbpInput:focus {
  outline: none; border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(16,104,179,.1);
}
.btn-row { margin-top: 12px; display: flex; gap: 10px; align-items: center; }
.btn {
  padding: 9px 22px; font-size: 13px; border: none;
  border-radius: var(--radius-sm); cursor: pointer; font-weight: 700;
}
.btn-gen { background: var(--blue); color: white; }
.btn-gen:hover { background: var(--blue-dark); }
.hint { font-size: 11px; color: var(--text-light); }

/* =====================================================
   スコアシート本体
   ===================================================== */
.sheet-outer { background: white; margin: 0 16px 16px; padding: 4px; box-shadow: 0 2px 10px rgba(0,0,0,.15); }
.sheet {
  width: 575px; font-family: 'Meiryo','Yu Gothic','MS Gothic',sans-serif;
  font-size: 6.5pt; border: 2px solid rgba(52,38,24,0.75);
  position: relative; background: white; filter: url(#pencil);
}
.team-name-val, .info-cell, .pr-name, .coach-label { font-family: 'Klee One','Meiryo',cursive; }
td.a-blank, td.b-blank { font-family: 'Caveat','Klee One',cursive; }
.pr-foul.foul-used { font-family: 'Caveat',cursive; }
.q-box.used { font-family: 'Caveat',cursive; }
.sheet-header { display: flex; border-bottom: 1.5px solid rgba(52,38,24,0.75); }
.header-title-block { width: 295px; flex-shrink: 0; border-right: 1px solid rgba(52,38,24,0.75); padding: 2px 4px; }
.sheet-title { font-size: 14pt; font-weight: bold; letter-spacing: 1px; line-height: 1.2; white-space: nowrap; }
.sheet-subtitle { font-size: 5.5pt; color: #444; margin-top: 1px; }
.header-info-block { flex: 1; display: flex; flex-direction: column; }
.info-row { display: flex; border-bottom: 1px solid rgba(52,38,24,0.75); }
.info-row:last-child { border-bottom: none; }
.info-cell { flex: 1; padding: 1px 3px; font-size: 6pt; border-right: 1px solid rgba(120,95,70,0.45); }
.info-cell:last-child { border-right: none; }
.info-cell label { color: #555; }
.sheet-main { display: flex; border-bottom: 1.5px solid rgba(52,38,24,0.75); }
.left-panel { width: 295px; flex-shrink: 0; border-right: 1.5px solid rgba(52,38,24,0.75); display: flex; flex-direction: column; }
.team-section { flex: 1; border-bottom: 1.5px solid rgba(52,38,24,0.75); }
.team-section:last-child { border-bottom: none; }
.team-name-row { display: flex; align-items: stretch; border-bottom: 1px solid rgba(52,38,24,0.75); background: white; }
.team-label-cell { font-size: 6pt; font-weight: bold; padding: 1px 3px; border-right: 1px solid rgba(52,38,24,0.75); white-space: nowrap; display: flex; align-items: center; }
.team-name-val { flex: 1; font-size: 7pt; font-weight: bold; padding: 1px 4px; display: flex; align-items: center; }
.timeout-fouls-header { display: flex; border-bottom: 1px solid rgba(52,38,24,0.75); }
.to-block, .tf-block { flex: 1; padding: 1px 2px; }
.to-block { border-right: 1px solid rgba(52,38,24,0.75); }
.block-title { font-size: 5.5pt; font-weight: bold; color: #333; }
.quarter-rows { margin-top: 1px; }
.qrow { display: flex; align-items: center; gap: 2px; font-size: 5.5pt; margin-bottom: 1px; }
.q-period { display: flex; align-items: center; gap: 1px; margin-right: 4px; }
.q-period-label { font-weight: bold; font-size: 5pt; }
.q-box { width: 11px; height: 8px; border: 1px solid rgba(120,95,70,0.5); font-size: 5pt; text-align: center; line-height: 8px; background: white; }
.q-box.used { font-weight: bold; }
.q-box.tf-used { text-decoration: line-through; }
.foul-header-row { display: flex; border-top: 1px solid rgba(52,38,24,0.75); border-bottom: 1px solid rgba(52,38,24,0.75); background: white; font-size: 5pt; font-weight: bold; }
.foul-header-row > div { text-align: center; padding: 1px 0; border-right: 1px solid rgba(120,95,70,0.45); }
.foul-header-row > div:last-child { border-right: none; }
.col-no { width: 16px; } .col-lic { width: 28px; } .col-name { flex: 1; text-align: left; padding-left: 2px; }
.col-hash { width: 16px; } .col-in { width: 16px; } .col-f { width: 13px; }
.player-rows { display: flex; flex-direction: column; }
.player-row { display: flex; align-items: center; border-bottom: 1px solid rgba(120,95,70,0.35); min-height: 14px; }
.player-row:last-child { border-bottom: none; }
.player-row > div { font-size: 6pt; text-align: center; border-right: 1px solid rgba(120,95,70,0.35); padding: 0; line-height: 14px; height: 14px; overflow: hidden; }
.player-row > div:last-child { border-right: none; }
.player-row > div.pr-name { text-align: left; padding-left: 2px; font-size: 6pt; }
.pr-foul.foul-used { font-weight: bold; text-decoration: line-through; }
.coach-rows { border-top: 1px solid rgba(52,38,24,0.75); font-size: 5.5pt; }
.coach-row { display: flex; align-items: center; border-bottom: 1px solid rgba(120,95,70,0.35); height: 14px; padding: 0 3px; }
.coach-row:last-child { border-bottom: none; }
.coach-label { font-weight: bold; margin-right: 4px; white-space: nowrap; }

<script>
// =====================================================
// Firebase 初期化
// =====================================================
const firebaseConfig = {
  apiKey: "AIzaSyCURuyJfsPu8R0GVhMVQEHQBtAC9WCdtjM",
  authDomain: "molten-scorelink.firebaseapp.com",
  projectId: "molten-scorelink",
  storageBucket: "molten-scorelink.firebasestorage.app",
  messagingSenderId: "956502602785",
  appId: "1:956502602785:web:cab678cf57e0c7f5b21f60"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// =====================================================
// アプリ状態
// =====================================================
let currentTournamentId = null;   // 表示中の大会ID
let currentGameId       = null;   // 編集中の試合ID
let currentTab          = 'games';
let lastTotalA = 0, lastTotalB = 0;
let editingTournamentId = null;   // モーダルの編集対象

// =====================================================
// 画面切り替え
// =====================================================
function showView(name) {
  document.getElementById('view-tournaments').style.display = name === 'tournaments' ? 'block' : 'none';
  document.getElementById('view-detail').style.display      = name === 'detail'      ? 'block' : 'none';
  document.getElementById('view-editor').style.display      = name === 'editor'      ? 'block' : 'none';
}

// =====================================================
// トースト
// =====================================================
function showToast(msg, duration = 2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}

// =====================================================
// ユーティリティ
// =====================================================
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const qClass = q => q===1||q===3 ? 'q1' : q===2||q===4 ? 'q2' : 'qot';

function withTimeout(promise, ms = 10000) {
  return Promise.race([
    promise,
    new Promise((_, r) => setTimeout(() => r(new Error(`タイムアウト（${ms/1000}秒）`)), ms))
  ]);
}

// =====================================================
// 大会一覧
// =====================================================
async function loadTournaments() {
  const cont = document.getElementById('tournament-list-container');
  cont.innerHTML = '<div class="loading-msg">読み込み中...</div>';
  try {
    const snap = await withTimeout(
      db.collection('tournaments').orderBy('startDate', 'desc').get()
    );
    if (snap.empty) {
      cont.innerHTML = `<div class="empty-state">大会が登録されていません<br>「大会を登録」から追加してください</div>`;
      return;
    }
    // 各大会の試合数を取得
    const cards = await Promise.all(snap.docs.map(async doc => {
      const d = doc.data();
      const gSnap = await db.collection('games')
        .where('tournamentId', '==', doc.id).get();
      const gameCount = gSnap.size;
      const teams = new Set();
      gSnap.docs.forEach(g => {
        if (g.data().teamAName) teams.add(g.data().teamAName);
        if (g.data().teamBName) teams.add(g.data().teamBName);
      });
      const period = [d.startDate, d.endDate].filter(Boolean).join(' 〜 ') || '日程未定';
      return `
        <div class="tournament-card" onclick="openTournament('${doc.id}')">
          <div class="tc-info">
            <div class="tc-name">${esc(d.name)}</div>
            <div class="tc-meta">${esc(period)}${d.venue ? '　' + esc(d.venue) : ''}</div>
            <div class="tc-badges">
              <span class="tc-badge">試合数: ${gameCount}</span>
              <span class="tc-badge">チーム数: ${teams.size}</span>
              ${d.note ? `<span class="tc-badge">${esc(d.note.slice(0,20))}</span>` : ''}
            </div>
          </div>
          <div class="tc-actions" onclick="event.stopPropagation()">
            <button class="btn-card btn-open" onclick="openTournament('${doc.id}')">開く</button>
            <button class="btn-card btn-edit" onclick="openTournamentModal('${doc.id}')">編集</button>
            <button class="btn-card btn-delete" onclick="deleteTournament('${doc.id}')">削除</button>
          </div>
        </div>`;
    }));
    cont.innerHTML = cards.join('');
  } catch(e) {
    console.error(e);
    cont.innerHTML = `<div class="loading-msg" style="color:red">読み込みエラー: ${e.message}</div>`;
  }
}

// =====================================================
// 大会を開く
// =====================================================
async function openTournament(id) {
  currentTournamentId = id;
  showView('detail');
  try {
    const doc = await withTimeout(db.collection('tournaments').doc(id).get());
    const d = doc.data();
    document.getElementById('detail-title').textContent = d.name || '大会';
    const period = [d.startDate, d.endDate].filter(Boolean).join(' 〜 ');
    document.getElementById('detail-meta').textContent =
      [period, d.venue ? '📍 ' + d.venue : ''].filter(Boolean).join('　');
  } catch(e) { /* ignore */ }
  switchTab('games');
}

function backToTournaments() {
  showView('tournaments');
  loadTournaments();
}

// =====================================================
// タブ切り替え
// =====================================================
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-games').style.display = tab === 'games' ? 'block' : 'none';
  document.getElementById('tab-stats').style.display = tab === 'stats' ? 'block' : 'none';
  document.getElementById('tab-games-btn').className = 'tab-btn' + (tab === 'games' ? ' active' : '');
  document.getElementById('tab-stats-btn').className = 'tab-btn' + (tab === 'stats' ? ' active' : '');
  if (tab === 'games') loadGames();
  else                 loadStats();
}

// =====================================================
// 試合一覧（大会内）
// =====================================================
async function loadGames() {
  const cont = document.getElementById('game-list-container');
  cont.innerHTML = '<div class="loading-msg">読み込み中...</div>';
  try {
    // orderBy + where の複合インデックスを避けるため JS でソート
    const snap = await withTimeout(
      db.collection('games')
        .where('tournamentId', '==', currentTournamentId)
        .get()
    );
    if (snap.empty) {
      cont.innerHTML = `<div class="empty-state">この大会の試合がありません<br>「試合を追加」から入力してください</div>`;
      return;
    }
    // gameDate → gameNo の順でソート
    const sortedDocs = snap.docs.slice().sort((a, b) => {
      const da = a.data(), db2 = b.data();
      const dateA = da.gameDate || '', dateB = db2.gameDate || '';
      if (dateA !== dateB) return dateA < dateB ? -1 : 1;
      return (parseInt(da.gameNo) || 0) - (parseInt(db2.gameNo) || 0);
    });
    cont.innerHTML = sortedDocs.map(doc => {
      const d = doc.data();
      const teamA = d.teamAName || 'チームA';
      const teamB = d.teamBName || 'チームB';
      const score = (d.totalA != null) ? `${d.totalA} - ${d.totalB}` : '- - -';
      const label = [d.gameDate, d.gameNo ? `Game ${d.gameNo}` : ''].filter(Boolean).join('　');
      return `
        <div class="game-card" onclick="openGame('${doc.id}')">
          <div class="gc-info">
            <div class="gc-title">${esc(label) || '試合'}</div>
            <div class="gc-teams">${esc(teamA)} <span style="color:#999;font-weight:normal">vs</span> ${esc(teamB)}</div>
          </div>
          <div class="gc-score">${esc(score)}</div>
          <div class="gc-actions" onclick="event.stopPropagation()">
            <button class="btn-card btn-open" onclick="openGame('${doc.id}')">開く</button>
            <button class="btn-card btn-delete" onclick="deleteGame('${doc.id}')">削除</button>
          </div>
        </div>`;
    }).join('');
  } catch(e) {
    console.error(e);
    cont.innerHTML = `<div class="loading-msg" style="color:red">読み込みエラー: ${e.message}</div>`;
  }
}

// =====================================================
// 成績・ランキング（大会内）
// =====================================================
// 成績ページ: 状態管理
// =====================================================
let statsData = null;
let statsFilters = {
  showRanking: true,
  showTeams:   true,
  showGames:   true,
  rankMetric:  'pts'   // 'pts'=総得点順, 'avg'=平均得点順
};

function toggleStatsSection(key) {
  statsFilters[key] = !statsFilters[key];
  renderStatsContent();
}

function setRankMetric(metric) {
  statsFilters.rankMetric = metric;
  renderStatsContent();
}

// =====================================================
// データ取得（1回だけ fetch → statsData にキャッシュ）
// =====================================================
async function loadStats() {
  const cont = document.getElementById('stats-container');
  statsData = null;
  cont.innerHTML = '<div class="loading-msg">集計中...</div>';
  try {
    const snap = await withTimeout(
      db.collection('games')
        .where('tournamentId', '==', currentTournamentId)
        .get()
    );
    if (snap.empty) {
      cont.innerHTML = '<div class="dash-no-data">試合データがありません。</div>';
      return;
    }

    const playerMap = {};
    const teamMap   = {};
    const gameList  = [];

    for (const doc of snap.docs) {
      const d = doc.data();
      if (!d.pbpData) continue;
      const plays = parsePBP(d.pbpData);
      const st    = buildState(plays);
      const totalA = st.qScore.A.reduce((a,b)=>a+b,0);
      const totalB = st.qScore.B.reduce((a,b)=>a+b,0);
      const teamA  = d.teamAName || 'チームA';
      const teamB  = d.teamBName || 'チームB';

      gameList.push({ id: doc.id, teamA, teamB, totalA, totalB, gameDate: d.gameDate || '', gameNo: d.gameNo || '' });

      for (const [tName, pf, pa] of [[teamA, totalA, totalB],[teamB, totalB, totalA]]) {
        if (!teamMap[tName]) teamMap[tName] = {name:tName,wins:0,losses:0,draws:0,pf:0,pa:0,games:0};
        teamMap[tName].games++;
        teamMap[tName].pf += pf; teamMap[tName].pa += pa;
        if (pf > pa) teamMap[tName].wins++;
        else if (pf < pa) teamMap[tName].losses++;
        else teamMap[tName].draws++;
      }

      for (const team of ['A','B']) {
        const tName = team === 'A' ? teamA : teamB;
        const cells = team === 'A' ? st.cellsA : st.cellsB;
        const playerPts = {};
        for (const cell of Object.values(cells)) {
          if (cell.idx !== 0) continue;
          const pts = cell.scoreType === '3P' ? 3 : cell.scoreType === '2P' ? 2 : 1;
          playerPts[cell.playerNum] = (playerPts[cell.playerNum] || 0) + pts;
        }
        for (const p of Object.values(st.players[team])) {
          const key = `${tName}|${p.num}`;
          if (!playerMap[key]) playerMap[key] = { name: p.name || `#${p.num}`, num: p.num, team: tName, pts: 0, games: 0, fouls: 0 };
          playerMap[key].pts   += (playerPts[p.num] || 0);
          playerMap[key].fouls += (st.fouls[team][p.num] || 0);
          playerMap[key].games++;
          if (!playerMap[key].name && p.name) playerMap[key].name = p.name;
        }
      }
    }

    statsData = { playerMap, teamMap, gameList, totalGames: snap.size };
    renderStatsContent();
  } catch(e) {
    console.error(e);
    cont.innerHTML = `<div class="dash-no-data" style="color:red">集計エラー: ${e.message}</div>`;
  }
}

// =====================================================
// 描画（フィルター変更時も呼ばれる）
// =====================================================
function renderStatsContent() {
  if (!statsData) return;
  const { playerMap, teamMap, gameList, totalGames } = statsData;
  const { showRanking, showTeams, showGames, rankMetric } = statsFilters;
  const cont = document.getElementById('stats-container');

  // ランキングソート＋同点同順位
  const getVal = p => rankMetric === 'avg'
    ? (p.games > 0 ? p.pts / p.games : 0)
    : p.pts;

  const allSorted = Object.values(playerMap).sort((a, b) => getVal(b) - getVal(a));

  // 同点なら同じ順位、次は人数分スキップ（例：3位が3人→次は6位）
  let curRank = 1;
  for (let i = 0; i < allSorted.length; i++) {
    if (i > 0 && getVal(allSorted[i]) < getVal(allSorted[i - 1])) {
      curRank = i + 1;
    }
    allSorted[i].rank = curRank;
  }

  const scorers = allSorted.slice(0, 15);

  const teams  = Object.values(teamMap).sort((a,b) => b.wins - a.wins || (b.pf-b.pa) - (a.pf-a.pa));
  const recent = [...gameList].sort((a,b) => (a.gameDate > b.gameDate ? 1 : -1));
  const rankLabel = rankMetric === 'avg' ? '平均得点' : '総得点';
  const highlightCol = rankMetric === 'avg' ? 5 : 4; // 強調列インデックス(0始まり)

  cont.innerHTML = `
    <div class="stats-filter-bar">
      <span class="filter-label">表示：</span>
      <button class="toggle-chip ${showRanking?'active':''}" onclick="toggleStatsSection('showRanking')">得点ランキング</button>
      <button class="toggle-chip ${showTeams?'active':''}"   onclick="toggleStatsSection('showTeams')">チーム成績</button>
      <button class="toggle-chip ${showGames?'active':''}"   onclick="toggleStatsSection('showGames')">試合結果</button>
      ${showRanking ? `
      <div class="filter-divider"></div>

async function openTournamentModal(id = null) {
  editingTournamentId = id;
  document.getElementById('modal-title').textContent = id ? '大会を編集' : '大会を登録';
  document.getElementById('m-name').value = '';
  document.getElementById('m-startDate').value = '';
  document.getElementById('m-endDate').value = '';
  document.getElementById('m-venue').value = '';
  document.getElementById('m-note').value = '';
  if (id) {
    try {
      const doc = await withTimeout(db.collection('tournaments').doc(id).get());
      const d = doc.data();
      document.getElementById('m-name').value      = d.name      || '';
      document.getElementById('m-startDate').value = d.startDate || '';
      document.getElementById('m-endDate').value   = d.endDate   || '';
      document.getElementById('m-venue').value     = d.venue     || '';
      document.getElementById('m-note').value      = d.note      || '';
    } catch(e) { /* ignore */ }
  }
  document.getElementById('modal-tournament').classList.add('open');
}

function closeTournamentModal() {
  document.getElementById('modal-tournament').classList.remove('open');
  editingTournamentId = null;
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-tournament')) closeTournamentModal();
}

async function saveTournament() {
  const name = document.getElementById('m-name').value.trim();
  if (!name) { alert('大会名を入力してください'); return; }
  const data = {
    name,
    startDate: document.getElementById('m-startDate').value,
    endDate:   document.getElementById('m-endDate').value,
    venue:     document.getElementById('m-venue').value.trim(),
    note:      document.getElementById('m-note').value.trim(),
    updatedAt: new Date().toISOString()
  };
  try {
    if (editingTournamentId) {
      await withTimeout(db.collection('tournaments').doc(editingTournamentId).update(data));
      showToast('大会を更新しました');
      // 詳細画面が開いていれば表示を更新
      if (currentTournamentId === editingTournamentId) {
        document.getElementById('detail-title').textContent = name;
      }
    } else {
      data.createdAt = new Date().toISOString();
      await withTimeout(db.collection('tournaments').add(data));
      showToast('大会を登録しました');
    }
    closeTournamentModal();
    // 大会一覧画面にいれば再読み込み
    if (document.getElementById('view-tournaments').style.display !== 'none') {
      loadTournaments();
    }
  } catch(e) {
    console.error(e);
    showToast('エラー: ' + e.message);
  }
}

async function deleteTournament(id) {
  if (!confirm('この大会を削除しますか？\n※ 試合データは削除されません')) return;
  try {
    await withTimeout(db.collection('tournaments').doc(id).delete());
    showToast('大会を削除しました');
    loadTournaments();
  } catch(e) {
    showToast('エラー: ' + e.message);
  }
}

// =====================================================
// パーサー
// =====================================================
function extractPlayer(ev) {
  const m = ev.match(/#(\d+)([^#]*?)(?=2P|3P|フリースロー|Pファイル|Pファウル|Tファイル|Tファウル|タイムアウト|$)/);
  if (!m) return { num: null, name: '' };
  return { num: m[1], name: m[2].trim() };
}

function parseEvent(ev) {
  if (!ev || !ev.trim()) return null;
  const { num: playerNum, name: playerName } = extractPlayer(ev);
  let type = null, points = 0;
  if      (ev.includes('3P成功'))                                { type = '3P'; points = 3; }
  else if (ev.includes('2P成功'))                                { type = '2P'; points = 2; }
  else if (ev.includes('フリースロー成功'))                      { type = 'FT'; points = 1; }
  else if (ev.includes('Pファイル') || ev.includes('Pファウル')) { type = 'PF'; }
  else if (ev.includes('Tファイル') || ev.includes('Tファウル')) { type = 'TF'; }
  else if (ev.includes('タイムアウト'))                          { type = 'TO'; }
  return { playerNum, playerName, type, points };
}

function parsePBP(text) {
  return text.trim().split('\n').filter(l => l.trim()).map(l => {
    const p = l.split('\t');
    const q = parseInt(p[0]);
    if (isNaN(q)) return null;
    return { quarter: q, timer: (p[1]||'').trim(), evA: (p[2]||'').trim(), evB: (p[4]||'').trim() };
  }).filter(Boolean);
}

// =====================================================
// 状態構築
// =====================================================
function buildState(plays) {
  const st = {
    scoreA: 0, scoreB: 0,
    cellsA: {}, cellsB: {},
    players:   { A: {}, B: {} },
    fouls:     { A: {}, B: {} },
    teamFouls: { A: [0,0,0,0,0], B: [0,0,0,0,0] },
    timeouts:  { A: [[],[],[],[],[]], B: [[],[],[],[],[]] },
    qScore:    { A: [0,0,0,0,0], B: [0,0,0,0,0] }
  };
  function proc(team, evStr, q, timer) {
    const ev = parseEvent(evStr);
    if (!ev) return;
    const qi = Math.min(q,4) - 1;
    if (ev.playerNum && !st.players[team][ev.playerNum])
      st.players[team][ev.playerNum] = { num: ev.playerNum, name: ev.playerName || '' };
    if (ev.points > 0) {
      const cells = team === 'A' ? st.cellsA : st.cellsB;
      for (let i = 0; i < ev.points; i++) {
        if (team === 'A') st.scoreA++; else st.scoreB++;
        const score = team === 'A' ? st.scoreA : st.scoreB;
        cells[score] = { playerNum: ev.playerNum, scoreType: ev.type, quarter: q, idx: i };
      }
      st.qScore[team][qi] += ev.points;
    }
    if (ev.type === 'PF' || ev.type === 'TF') {
      if (ev.playerNum) st.fouls[team][ev.playerNum] = (st.fouls[team][ev.playerNum] || 0) + 1;
      st.teamFouls[team][qi]++;
    }
    if (ev.type === 'TO') st.timeouts[team][qi].push(timer || '');
  }
  for (const p of plays) {
    if (p.evA) proc('A', p.evA, p.quarter, p.timer);
    if (p.evB) proc('B', p.evB, p.quarter, p.timer);
  }
  return st;
}

// =====================================================
// スコアシート生成
// =====================================================
function scoreCell(cells, score, side) {
  const c = cells[score];
  if (!c) return `<td class="${side}-blank"></td>`;
  const isFT = c.scoreType === 'FT';
  const mark = isFT
    ? (c.idx === 0 ? `${esc(c.playerNum)}●` : '●')
    : (c.idx === 0 ? `${esc(c.playerNum)}/` : '/');
  return `<td class="${side}-blank ${isFT?'ft-mark':'fg-mark'} ${qClass(c.quarter)}"><span>${mark}</span></td>`;
}

function buildRunningScore(st) {
  let rows = '';
  for (let r = 1; r <= 40; r++) {
    const style = r % 10 === 0 ? ' style="border-bottom:1.5px solid rgba(100,80,60,0.6)"' : '';
    rows += `<tr${style}>`;
    for (let g = 0; g < 4; g++) {
      const n = r + g * 40;
      rows += scoreCell(st.cellsA, n, 'a');
      rows += `<td class="col-num">${n}</td><td class="col-num">${n}</td>`;
      rows += scoreCell(st.cellsB, n, 'b');
    }
    rows += '</tr>';
  }
  return rows;
}

function buildPlayerRows(team, st) {
  const list = Object.values(st.players[team]).sort((a,b)=>parseInt(a.num)-parseInt(b.num));
  let html = '';
  for (let i = 0; i < 18; i++) {
    const p = list[i];
    const fc = p ? (st.fouls[team][p.num] || 0) : 0;
    html += `<div class="player-row">
      <div class="col-no">${p ? esc(p.num) : ''}</div>
      <div class="col-lic"></div>
      <div class="col-name pr-name">${p ? esc(p.name) : ''}</div>
      <div class="col-hash">${p ? esc(p.num) : ''}</div>
      <div class="col-in"></div>
      ${[1,2,3,4,5].map(n=>`<div class="col-f pr-foul${n<=fc?' foul-used':''}">${n}</div>`).join('')}
    </div>`;
  }
  return html;
}

function toBoxes(team, qi, st) {
  const used = st.timeouts[team][qi] || [];
  return [0,1,2].map(i=>`<div class="q-box${used[i]!==undefined?' used':''}">${used[i]||''}</div>`).join('');
}
function tfBoxes(team, qi, st) {
  const used = st.teamFouls[team][qi] || 0;
  return [1,2,3,4].map(n=>`<div class="q-box${n<=used?' tf-used':''}">${n}</div>`).join('');
}

  return `
