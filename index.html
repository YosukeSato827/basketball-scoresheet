<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バスケットボール スコアシート</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<!-- Firebase compat SDK -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Meiryo', 'Yu Gothic', 'MS Gothic', sans-serif;
  background: #e8eaf6;
  font-size: 12px;
}

/* =====================================================
   一覧画面
   ===================================================== */
#view-list { display: block; }
#view-editor { display: none; }

.list-header {
  background: #1a237e; color: white;
  padding: 14px 20px;
  display: flex; align-items: center; justify-content: space-between;
}
.list-header h1 { font-size: 18px; }

.btn-new {
  background: white; color: #1a237e;
  border: none; border-radius: 6px;
  padding: 8px 16px; font-size: 13px;
  font-weight: bold; cursor: pointer;
}
.btn-new:hover { background: #e8eaf6; }

.list-body { padding: 16px; max-width: 800px; margin: 0 auto; }

.list-empty {
  text-align: center; padding: 60px 20px;
  color: #888; font-size: 14px;
}
.list-empty span { font-size: 48px; display: block; margin-bottom: 12px; }

.game-card {
  background: white; border-radius: 8px;
  box-shadow: 0 1px 6px rgba(0,0,0,.1);
  padding: 14px 16px; margin-bottom: 10px;
  display: flex; align-items: center; gap: 12px;
  cursor: pointer; transition: box-shadow .15s;
}
.game-card:hover { box-shadow: 0 3px 12px rgba(0,0,0,.18); }

.game-card-info { flex: 1; min-width: 0; }
.game-card-title {
  font-size: 13px; font-weight: bold; color: #1a237e;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.game-card-teams { font-size: 15px; font-weight: bold; margin: 3px 0; }
.game-card-meta { font-size: 11px; color: #888; }

.game-card-score {
  font-size: 22px; font-weight: bold;
  color: #1a237e; white-space: nowrap; text-align: center; min-width: 80px;
}

.game-card-actions { display: flex; gap: 6px; }
.btn-card {
  padding: 5px 10px; border: none; border-radius: 4px;
  font-size: 12px; cursor: pointer; font-weight: bold;
}
.btn-open   { background: #1565c0; color: white; }
.btn-delete { background: #fff; color: #c62828; border: 1px solid #c62828; }

.loading-msg {
  text-align: center; padding: 30px; color: #888;
}

/* =====================================================
   エディター画面 ツールバー
   ===================================================== */
.editor-toolbar {
  background: #1a237e; color: white;
  padding: 8px 16px;
  display: flex; align-items: center; gap: 10px;
}
.btn-back {
  background: rgba(255,255,255,.15); color: white;
  border: 1px solid rgba(255,255,255,.4); border-radius: 4px;
  padding: 5px 12px; font-size: 13px; cursor: pointer;
}
.btn-back:hover { background: rgba(255,255,255,.25); }
.toolbar-title {
  flex: 1; font-size: 13px; font-weight: bold;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.btn-save {
  background: #43a047; color: white;
  border: none; border-radius: 4px;
  padding: 5px 14px; font-size: 13px;
  font-weight: bold; cursor: pointer;
}
.btn-save:hover { background: #388e3c; }
.btn-save:disabled { background: #888; cursor: default; }
.btn-print-small {
  background: rgba(255,255,255,.15); color: white;
  border: 1px solid rgba(255,255,255,.4); border-radius: 4px;
  padding: 5px 12px; font-size: 13px; cursor: pointer;
}
.btn-print-small:hover { background: rgba(255,255,255,.25); }

/* トースト通知 */
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #323232; color: white;
  padding: 10px 24px; border-radius: 4px;
  font-size: 13px; z-index: 9999;
  opacity: 0; transition: opacity .3s;
  pointer-events: none;
}
#toast.show { opacity: 1; }

/* =====================================================
   入力フォーム（エディター内）
   ===================================================== */
.input-section {
  background: white; padding: 16px 20px; margin: 12px 16px;
  border-radius: 8px; box-shadow: 0 2px 10px rgba(0,0,0,.15);
}
.input-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 10px; margin-bottom: 10px;
}
.input-grid label { display: block; font-size: 11px; font-weight: bold; margin-bottom: 3px; }
.input-grid input {
  width: 100%; padding: 6px 8px;
  border: 1px solid #bbb; border-radius: 4px;
  font-size: 13px; font-family: inherit;
}
.pbp-label { display: block; font-size: 11px; font-weight: bold; margin-bottom: 4px; }
textarea#pbpInput {
  width: 100%; height: 130px; padding: 8px;
  border: 1px solid #bbb; border-radius: 4px;
  font-size: 12px; font-family: 'Consolas', monospace; resize: vertical;
}
.btn-row { margin-top: 10px; display: flex; gap: 8px; align-items: center; }
.btn { padding: 8px 20px; font-size: 13px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
.btn-gen   { background: #1565c0; color: white; }
.hint { font-size: 10px; color: #777; }

/* =====================================================
   スコアシート本体
   ===================================================== */
.sheet-outer {
  background: white; margin: 0 16px 16px;
  padding: 4px; box-shadow: 0 2px 10px rgba(0,0,0,.15);
}

.sheet {
  width: 575px;
  font-family: 'Meiryo', 'Yu Gothic', 'MS Gothic', sans-serif;
  font-size: 6.5pt;
  border: 2px solid rgba(52,38,24,0.75);
  position: relative;
  background: white;
  filter: url(#pencil);
}

/* 手書き入力部分のみ Klee One / Caveat */
.team-name-val, .info-cell, .pr-name, .coach-label {
  font-family: 'Klee One', 'Meiryo', cursive;
}
td.a-blank, td.b-blank {
  font-family: 'Caveat', 'Klee One', cursive;
}
.pr-foul.foul-used { font-family: 'Caveat', cursive; }
.q-box.used { font-family: 'Caveat', cursive; }

/* ヘッダー */
.sheet-header { display: flex; border-bottom: 1.5px solid rgba(52,38,24,0.75); }
.header-title-block {
  width: 295px; flex-shrink: 0;
  border-right: 1px solid rgba(52,38,24,0.75);
  padding: 2px 4px;
}
.sheet-title { font-size: 14pt; font-weight: bold; letter-spacing: 1px; line-height: 1.2; white-space: nowrap; }
.sheet-subtitle { font-size: 5.5pt; color: #444; margin-top: 1px; }
.header-info-block { flex: 1; display: flex; flex-direction: column; }
.info-row { display: flex; border-bottom: 1px solid rgba(52,38,24,0.75); }
.info-row:last-child { border-bottom: none; }
.info-cell { flex: 1; padding: 1px 3px; font-size: 6pt; border-right: 1px solid rgba(120,95,70,0.45); }
.info-cell:last-child { border-right: none; }
.info-cell label { color: #555; }

/* メインエリア */
.sheet-main { display: flex; border-bottom: 1.5px solid rgba(52,38,24,0.75); }

/* 左パネル */
.left-panel {
  width: 295px; flex-shrink: 0;
  border-right: 1.5px solid rgba(52,38,24,0.75);
  display: flex; flex-direction: column;
}
.team-section { flex: 1; border-bottom: 1.5px solid rgba(52,38,24,0.75); }
.team-section:last-child { border-bottom: none; }

.team-name-row {
  display: flex; align-items: stretch;
  border-bottom: 1px solid rgba(52,38,24,0.75);
  background: white;
}
.team-label-cell {
  font-size: 6pt; font-weight: bold;
  padding: 1px 3px; border-right: 1px solid rgba(52,38,24,0.75);
  white-space: nowrap; display: flex; align-items: center;
}
.team-name-val { flex: 1; font-size: 7pt; font-weight: bold; padding: 1px 4px; display: flex; align-items: center; }

.timeout-fouls-header { display: flex; border-bottom: 1px solid rgba(52,38,24,0.75); }
.to-block, .tf-block { flex: 1; padding: 1px 2px; }
.to-block { border-right: 1px solid rgba(52,38,24,0.75); }
.block-title { font-size: 5.5pt; font-weight: bold; color: #333; }
.quarter-rows { margin-top: 1px; }
.qrow { display: flex; align-items: center; gap: 2px; font-size: 5.5pt; margin-bottom: 1px; }
.q-period { display: flex; align-items: center; gap: 1px; margin-right: 4px; }
.q-period-label { font-weight: bold; font-size: 5pt; }
.q-box {
  width: 11px; height: 8px; border: 1px solid rgba(120,95,70,0.5);
  font-size: 5pt; text-align: center; line-height: 8px; background: white;
}
.q-box.used { font-weight: bold; }
.q-box.tf-used { text-decoration: line-through; }

.foul-header-row {
  display: flex;
  border-top: 1px solid rgba(52,38,24,0.75);
  border-bottom: 1px solid rgba(52,38,24,0.75);
  background: white; font-size: 5pt; font-weight: bold;
}
.foul-header-row > div {
  text-align: center; padding: 1px 0;
  border-right: 1px solid rgba(120,95,70,0.45);
}
.foul-header-row > div:last-child { border-right: none; }
.col-no    { width: 16px; }
.col-lic   { width: 28px; }
.col-name  { flex: 1; text-align: left; padding-left: 2px; }
.col-hash  { width: 16px; }
.col-in    { width: 16px; }
.col-f     { width: 13px; }

.player-rows { display: flex; flex-direction: column; }
.player-row {
  display: flex; align-items: center;
  border-bottom: 1px solid rgba(120,95,70,0.35);
  min-height: 14px;
}
.player-row:last-child { border-bottom: none; }
.player-row > div {
  font-size: 6pt; text-align: center;
  border-right: 1px solid rgba(120,95,70,0.35);
  padding: 0; line-height: 14px; height: 14px; overflow: hidden;
}
.player-row > div:last-child { border-right: none; }
.player-row > div.pr-name { text-align: left; padding-left: 2px; font-size: 6pt; }
.pr-foul.foul-used { font-weight: bold; text-decoration: line-through; }

.coach-rows { border-top: 1px solid rgba(52,38,24,0.75); font-size: 5.5pt; }
.coach-row {
  display: flex; align-items: center;
  border-bottom: 1px solid rgba(120,95,70,0.35); height: 14px; padding: 0 3px;
}
.coach-row:last-child { border-bottom: none; }
.coach-label { font-weight: bold; margin-right: 4px; white-space: nowrap; }
.coach-sig { flex: 1; border-bottom: 1px solid rgba(120,95,70,0.45); height: 8px; margin: 1px 0; }

/* 右パネル（ランニングスコア） */
.right-panel { flex: 1; overflow: hidden; }
.running-label {
  text-align: center; font-size: 6pt; font-weight: bold;
  border-bottom: 1px solid rgba(52,38,24,0.75); padding: 1px; background: white;
}
.running-score-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
.running-score-table th, .running-score-table td {
  border: 1px solid rgba(120,95,70,0.45);
  padding: 0; text-align: center; height: 17px; line-height: 17px; overflow: hidden;
}
.running-score-table th {
  background: white; font-size: 5.5pt; font-weight: bold; height: 11px; line-height: 11px;
}
.th-a { } .th-b { }
.col-a-blank { width: 21px; }
.col-num     { width: 12px; font-size: 5.5pt; color: #666; background: white; }
.col-b-blank { width: 21px; }
td.a-blank, td.b-blank { font-size: 7pt; font-weight: 700; }
td.fg-mark { } td.ft-mark { }
td.q1 span, td.q3 span { color: #c62828; }
td.q2 span, td.q4 span { color: #1565c0; }
td.qot span { color: #6a1b9a; }

/* フッター */
.sheet-footer { display: flex; border-bottom: 1.5px solid rgba(52,38,24,0.75); }
.qs-table { width: 100%; border-collapse: collapse; }
.qs-table th, .qs-table td {
  border: 1px solid rgba(120,95,70,0.45); font-size: 6pt;
  text-align: center; padding: 1px 2px; height: 13px; line-height: 13px;
}
.qs-table th { background: white; font-weight: bold; }
.qs-name { text-align: left; padding-left: 3px; font-weight: bold; }
.qs-total { font-weight: bold; font-size: 7pt; }
.qs-winner td { font-weight: bold; }

.sheet-signatures { display: flex; border-bottom: 1.5px solid rgba(52,38,24,0.75); }
.sig-cell {
  flex: 1; font-size: 5.5pt; padding: 1px 3px;
  border-right: 1px solid rgba(120,95,70,0.45); min-height: 18px;
}
.sig-cell:last-child { border-right: none; }
.sig-label { color: #555; }
.sig-line { border-bottom: 1px solid rgba(120,95,70,0.45); margin-top: 8px; }

/* =====================================================
   印刷
   ===================================================== */
@media print {
  body { background: white; }
  .editor-toolbar, .input-section, #view-list { display: none !important; }
  .sheet-outer { margin: 0; padding: 0; box-shadow: none; }
  .sheet { width: 100%; }
  @page { size: A4 portrait; margin: 8mm; }
}
</style>
</head>
<body>

<!-- SVGフィルター（色鉛筆のざらつき） -->
<svg style="position:absolute;width:0;height:0;overflow:hidden">
  <defs>
    <filter id="pencil" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="4" seed="8" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.9" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
</svg>

<!-- トースト通知 -->
<div id="toast"></div>

<!-- =====================================================
     画面①: 試合一覧
     ===================================================== -->
<div id="view-list">
  <div class="list-header">
    <h1>🏀 バスケ スコアシート</h1>
    <button class="btn-new" onclick="newGame()">＋ 新規試合</button>
  </div>
  <div class="list-body">
    <div id="game-list-container">
      <div class="loading-msg">読み込み中...</div>
    </div>
  </div>
</div>

<!-- =====================================================
     画面②: スコアシートエディター
     ===================================================== -->
<div id="view-editor">
  <!-- ツールバー -->
  <div class="editor-toolbar">
    <button class="btn-back" onclick="backToList()">← 一覧</button>
    <span class="toolbar-title" id="toolbar-title">新規試合</span>
    <button class="btn-save" id="btn-save" onclick="saveGame()">💾 保存</button>
    <button class="btn-print-small" onclick="window.print()">🖨 印刷</button>
  </div>

  <!-- 入力フォーム -->
  <div class="input-section">
    <div class="input-grid">
      <div><label>チームA 名前</label><input type="text" id="teamAName" placeholder="例: ホームチーム"></div>
      <div><label>チームB 名前</label><input type="text" id="teamBName" placeholder="例: ビジターチーム"></div>
      <div><label>大会名</label><input type="text" id="tournament" placeholder="例: ○○大会" oninput="updateToolbarTitle()"></div>
      <div><label>Game No.</label><input type="text" id="gameNo" placeholder="例: 1" oninput="updateToolbarTitle()"></div>
      <div><label>日付</label><input type="text" id="gameDate" placeholder="例: 2025/4/28"></div>
      <div><label>会場</label><input type="text" id="venue" placeholder="例: ○○体育館"></div>
    </div>
    <div>
      <label class="pbp-label">プレイバイプレイ（タブ区切り: Q・タイマー・Aイベント・スコア・Bイベント）</label>
      <textarea id="pbpInput" placeholder="1&#9;5:10&#9;#10岡田2P成功&#9;2 - 0&#9;&#10;1&#9;4:54&#9;&#9;2 - 2&#9;#5高尾2P成功"></textarea>
    </div>
    <div class="btn-row">
      <button class="btn btn-gen" onclick="generate()">スコアシート生成</button>
      <span class="hint">※ 印刷はA4縦・余白8mmを推奨</span>
    </div>
  </div>

  <div id="output"></div>
</div>

<script>
// =====================================================
// Firebase 初期化
// =====================================================
const firebaseConfig = {
  apiKey: "AIzaSyCURuyJfsPu8R0GVhMVQEHQBtAC9WCdtjM",
  authDomain: "molten-scorelink.firebaseapp.com",
  projectId: "molten-scorelink",
  storageBucket: "molten-scorelink.firebasestorage.app",
  messagingSenderId: "956502602785",
  appId: "1:956502602785:web:cab678cf57e0c7f5b21f60"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// =====================================================
// アプリ状態
// =====================================================
let currentGameId = null;   // 編集中のFirestore doc ID
let lastTotalA = 0, lastTotalB = 0;

// =====================================================
// 画面切り替え
// =====================================================
function showView(name) {
  document.getElementById('view-list').style.display   = name === 'list'   ? 'block' : 'none';
  document.getElementById('view-editor').style.display = name === 'editor' ? 'block' : 'none';
}

function newGame() {
  currentGameId = null;
  ['teamAName','teamBName','tournament','gameNo','gameDate','venue'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('pbpInput').value = '';
  document.getElementById('output').innerHTML = '';
  document.getElementById('toolbar-title').textContent = '新規試合';
  showView('editor');
}

function backToList() {
  showView('list');
  loadGames();
}

function updateToolbarTitle() {
  const t = document.getElementById('tournament').value;
  const n = document.getElementById('gameNo').value;
  const title = [t, n ? `Game ${n}` : ''].filter(Boolean).join(' ');
  document.getElementById('toolbar-title').textContent = title || '新規試合';
}

// =====================================================
// トースト通知
// =====================================================
function showToast(msg, duration = 2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}

// =====================================================
// Firestore: 試合一覧を読み込む
// =====================================================
async function loadGames() {
  const container = document.getElementById('game-list-container');
  container.innerHTML = '<div class="loading-msg">読み込み中...</div>';
  try {
    const snap = await db.collection('games')
      .orderBy('updatedAt', 'desc')
      .get();
    if (snap.empty) {
      container.innerHTML = `
        <div class="list-empty">
          <span>📋</span>
          保存済みの試合がありません<br>「新規試合」から作成してください
        </div>`;
      return;
    }
    container.innerHTML = snap.docs.map(doc => {
      const d = doc.data();
      const date = d.gameDate || '';
      const tournament = d.tournament || '';
      const gameNo = d.gameNo ? `Game ${d.gameNo}` : '';
      const titleText = [tournament, gameNo].filter(Boolean).join(' ') || '（タイトルなし）';
      const teamsText = `${d.teamAName || 'チームA'} vs ${d.teamBName || 'チームB'}`;
      const score = (d.totalA != null) ? `${d.totalA} - ${d.totalB}` : '- - -';
      return `
        <div class="game-card" onclick="openGame('${doc.id}')">
          <div class="game-card-info">
            <div class="game-card-title">${esc(titleText)}</div>
            <div class="game-card-teams">${esc(teamsText)}</div>
            <div class="game-card-meta">${esc(date)}</div>
          </div>
          <div class="game-card-score">${esc(score)}</div>
          <div class="game-card-actions" onclick="event.stopPropagation()">
            <button class="btn-card btn-open" onclick="openGame('${doc.id}')">開く</button>
            <button class="btn-card btn-delete" onclick="deleteGame('${doc.id}')">削除</button>
          </div>
        </div>`;
    }).join('');
  } catch(e) {
    container.innerHTML = `<div class="loading-msg" style="color:red">読み込みエラー: ${e.message}</div>`;
  }
}

// =====================================================
// Firestore: 試合を開く
// =====================================================
async function openGame(id) {
  try {
    const doc = await db.collection('games').doc(id).get();
    if (!doc.exists) { showToast('試合データが見つかりません'); return; }
    const d = doc.data();
    currentGameId = id;
    document.getElementById('teamAName').value  = d.teamAName  || '';
    document.getElementById('teamBName').value  = d.teamBName  || '';
    document.getElementById('tournament').value = d.tournament || '';
    document.getElementById('gameNo').value     = d.gameNo     || '';
    document.getElementById('gameDate').value   = d.gameDate   || '';
    document.getElementById('venue').value      = d.venue      || '';
    document.getElementById('pbpInput').value   = d.pbpData    || '';
    updateToolbarTitle();
    showView('editor');
    // PBPがあれば自動生成
    if (d.pbpData) generate();
  } catch(e) {
    showToast('エラー: ' + e.message);
  }
}

// =====================================================
// Firestore: 試合を保存
// =====================================================
async function saveGame() {
  const btn = document.getElementById('btn-save');
  btn.disabled = true;
  btn.textContent = '保存中...';
  try {
    const data = {
      teamAName:  document.getElementById('teamAName').value,
      teamBName:  document.getElementById('teamBName').value,
      tournament: document.getElementById('tournament').value,
      gameNo:     document.getElementById('gameNo').value,
      gameDate:   document.getElementById('gameDate').value,
      venue:      document.getElementById('venue').value,
      pbpData:    document.getElementById('pbpInput').value,
      totalA:     lastTotalA,
      totalB:     lastTotalB,
      updatedAt:  firebase.firestore.FieldValue.serverTimestamp()
    };
    if (currentGameId) {
      await db.collection('games').doc(currentGameId).update(data);
    } else {
      data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
      const ref = await db.collection('games').add(data);
      currentGameId = ref.id;
    }
    showToast('✅ 保存しました');
  } catch(e) {
    showToast('❌ 保存エラー: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '💾 保存';
  }
}

// =====================================================
// Firestore: 試合を削除
// =====================================================
async function deleteGame(id) {
  if (!confirm('この試合を削除しますか？')) return;
  try {
    await db.collection('games').doc(id).delete();
    showToast('🗑 削除しました');
    loadGames();
  } catch(e) {
    showToast('❌ 削除エラー: ' + e.message);
  }
}

// =====================================================
// パーサー
// =====================================================
function extractPlayer(ev) {
  const m = ev.match(/#(\d+)([^#]*?)(?=2P|3P|フリースロー|Pファイル|Pファウル|Tファイル|Tファウル|タイムアウト|$)/);
  if (!m) return { num: null, name: '' };
  return { num: m[1], name: m[2].trim() };
}

function parseEvent(ev) {
  if (!ev || !ev.trim()) return null;
  const { num: playerNum, name: playerName } = extractPlayer(ev);
  let type = null, points = 0;
  if      (ev.includes('3P成功'))                                     { type = '3P'; points = 3; }
  else if (ev.includes('2P成功'))                                     { type = '2P'; points = 2; }
  else if (ev.includes('フリースロー成功'))                           { type = 'FT'; points = 1; }
  else if (ev.includes('Pファイル') || ev.includes('Pファウル'))      { type = 'PF'; }
  else if (ev.includes('Tファイル') || ev.includes('Tファウル'))      { type = 'TF'; }
  else if (ev.includes('タイムアウト'))                               { type = 'TO'; }
  return { playerNum, playerName, type, points };
}

function parsePBP(text) {
  return text.trim().split('\n').filter(l => l.trim()).map(l => {
    const p = l.split('\t');
    const q = parseInt(p[0]);
    if (isNaN(q)) return null;
    return { quarter: q, timer: (p[1]||'').trim(), evA: (p[2]||'').trim(), evB: (p[4]||'').trim() };
  }).filter(Boolean);
}

// =====================================================
// 状態構築
// =====================================================
function buildState(plays) {
  const st = {
    scoreA: 0, scoreB: 0,
    cellsA: {}, cellsB: {},
    players:   { A: {}, B: {} },
    fouls:     { A: {}, B: {} },
    teamFouls: { A: [0,0,0,0,0], B: [0,0,0,0,0] },
    timeouts:  { A: [[],[],[],[],[]], B: [[],[],[],[],[]] },
    qScore:    { A: [0,0,0,0,0], B: [0,0,0,0,0] }
  };
  function proc(team, evStr, q, timer) {
    const ev = parseEvent(evStr);
    if (!ev) return;
    const qi = Math.min(q, 4) - 1;
    if (ev.playerNum && !st.players[team][ev.playerNum])
      st.players[team][ev.playerNum] = { num: ev.playerNum, name: ev.playerName || '' };
    if (ev.points > 0) {
      const cells = team === 'A' ? st.cellsA : st.cellsB;
      for (let i = 0; i < ev.points; i++) {
        if (team === 'A') st.scoreA++; else st.scoreB++;
        const score = team === 'A' ? st.scoreA : st.scoreB;
        cells[score] = { playerNum: ev.playerNum, scoreType: ev.type, quarter: q, idx: i };
      }
      st.qScore[team][qi] += ev.points;
    }
    if (ev.type === 'PF' || ev.type === 'TF') {
      if (ev.playerNum) st.fouls[team][ev.playerNum] = (st.fouls[team][ev.playerNum] || 0) + 1;
      st.teamFouls[team][qi]++;
    }
    if (ev.type === 'TO') st.timeouts[team][qi].push(timer || '');
  }
  for (const p of plays) {
    if (p.evA) proc('A', p.evA, p.quarter, p.timer);
    if (p.evB) proc('B', p.evB, p.quarter, p.timer);
  }
  return st;
}

// =====================================================
// HTML生成ヘルパー
// =====================================================
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const qClass = q => q===1||q===3 ? 'q1' : q===2||q===4 ? 'q2' : 'qot';

function scoreCell(cells, score, side) {
  const c = cells[score];
  if (!c) return `<td class="${side}-blank"></td>`;
  const isFT = c.scoreType === 'FT';
  const qc = qClass(c.quarter);
  const mark = isFT
    ? (c.idx === 0 ? `${esc(c.playerNum)}●` : '●')
    : (c.idx === 0 ? `${esc(c.playerNum)}/` : '/');
  return `<td class="${side}-blank ${isFT?'ft-mark':'fg-mark'} ${qc}"><span>${mark}</span></td>`;
}

function buildRunningScore(st) {
  let rows = '';
  for (let r = 1; r <= 40; r++) {
    const style = r % 10 === 0 ? ' style="border-bottom:1.5px solid rgba(100,80,60,0.6)"' : '';
    rows += `<tr${style}>`;
    for (let g = 0; g < 4; g++) {
      const n = r + g * 40;
      rows += scoreCell(st.cellsA, n, 'a');
      rows += `<td class="col-num">${n}</td>`;
      rows += `<td class="col-num">${n}</td>`;
      rows += scoreCell(st.cellsB, n, 'b');
    }
    rows += '</tr>';
  }
  return rows;
}

function buildPlayerRows(team, st) {
  const list = Object.values(st.players[team]).sort((a,b)=>parseInt(a.num)-parseInt(b.num));
  let html = '';
  for (let i = 0; i < 18; i++) {
    const p = list[i];
    const fc = p ? (st.fouls[team][p.num] || 0) : 0;
    html += `<div class="player-row">
      <div class="col-no">${p ? esc(p.num) : ''}</div>
      <div class="col-lic"></div>
      <div class="col-name pr-name">${p ? esc(p.name) : ''}</div>
      <div class="col-hash">${p ? esc(p.num) : ''}</div>
      <div class="col-in"></div>
      ${[1,2,3,4,5].map(n=>`<div class="col-f pr-foul${n<=fc?' foul-used':''}">${n}</div>`).join('')}
    </div>`;
  }
  return html;
}

function toBoxes(team, qi, st) {
  const used = st.timeouts[team][qi] || [];
  return [0,1,2].map(i =>
    `<div class="q-box${used[i]!==undefined?' used':''}">${used[i]||''}</div>`
  ).join('');
}

function tfBoxes(team, qi, st) {
  const used = st.teamFouls[team][qi] || 0;
  return [1,2,3,4].map(n =>
    `<div class="q-box${n<=used?' tf-used':''}">${n}</div>`
  ).join('');
}

function teamSection(team, teamName, st) {
  const qLabels = ['1Q','2Q','3Q','4Q'];
  return `
<div class="team-section">
  <div class="team-name-row">
    <div class="team-label-cell">チーム${team}:</div>
    <div class="team-name-val">${esc(teamName)}</div>
  </div>
  <div class="timeout-fouls-header">
    <div class="to-block">
      <div class="block-title">タイムアウト</div>
      <div class="quarter-rows">
        ${[0,1].map(pair=>`<div class="qrow">${[pair*2,pair*2+1].map(qi=>`
          <div class="q-period">
            <span class="q-period-label">${qLabels[qi]}</span>
            ${toBoxes(team,qi,st)}
          </div>`).join('')}</div>`).join('')}
        <div class="qrow"><div class="q-period">
          <span class="q-period-label" style="font-size:4.5pt;">OT</span>
          ${toBoxes(team,4,st)}
        </div></div>
      </div>
    </div>
    <div class="tf-block">
      <div class="block-title">チームファウル</div>
      <div class="quarter-rows">
        ${[0,1].map(pair=>`<div class="qrow">${[pair*2,pair*2+1].map(qi=>`
          <div class="q-period">
            <span class="q-period-label">${qLabels[qi]}</span>
            ${tfBoxes(team,qi,st)}
          </div>`).join('')}</div>`).join('')}
      </div>
    </div>
  </div>
  <div class="foul-header-row">
    <div class="col-no">No.</div>
    <div class="col-lic" style="font-size:4.5pt;">License</div>
    <div class="col-name">選手名</div>
    <div class="col-hash">#</div>
    <div class="col-in" style="font-size:4.5pt;">in</div>
    <div class="col-f">1</div><div class="col-f">2</div>
    <div class="col-f">3</div><div class="col-f">4</div><div class="col-f">5</div>
  </div>
  <div class="player-rows">${buildPlayerRows(team, st)}</div>
  <div class="coach-rows">
    <div class="coach-row"><span class="coach-label">ヘッドコーチ</span><div class="coach-sig"></div></div>
    <div class="coach-row"><span class="coach-label">アシスタントコーチ</span><div class="coach-sig"></div></div>
  </div>
</div>`;
}

  <div class="sheet-signatures">
